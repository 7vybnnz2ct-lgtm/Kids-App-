<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1c1512">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bärflix">
<title>Bärflix</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<link rel="icon" href="./icons/icon.svg">
<style>
:root{
  --bg:#1c1512;--panel:#2a201b;--panel2:#382a23;--panel3:#47362d;
  --text:#fff8ee;--muted:#cbbcaf;--gold:#f3c85b;--mint:#8fc39a;
  --coral:#df836d;--blue:#7eb8c6;--danger:#d95c5c;--line:rgba(255,255,255,.12);
  --shadow:0 22px 70px rgba(0,0,0,.34);--r:24px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 85% 0,#3d2c23 0,#1c1512 44%);color:var(--text);font-family:Inter,ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{min-height:100vh}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
button:disabled{opacity:.38;cursor:not-allowed}
img{max-width:100%}
.app{min-height:100vh;padding:calc(14px + env(safe-area-inset-top)) 16px calc(26px + env(safe-area-inset-bottom))}
.wrap{max-width:1450px;margin:auto}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:12px}.logo{font-size:44px;filter:drop-shadow(0 10px 20px rgba(0,0,0,.28))}
.brand h1{margin:0;font-size:34px;line-height:1}.brand small{color:var(--muted)}
.btn{border:0;border-radius:15px;padding:11px 15px;background:var(--panel3);color:var(--text);font-weight:850}
.btn.primary{background:var(--gold);color:#291f19}.btn.mint{background:var(--mint);color:#152117}.btn.coral{background:var(--coral);color:#2a1712}
.btn.danger{background:var(--danger);color:#fff}.btn.ghost{background:transparent;border:1px solid var(--line)}.btn.icon{width:42px;height:42px;padding:0;display:grid;place-items:center;border-radius:50%}
.hero{position:relative;overflow:hidden;border-radius:30px;padding:30px;background:linear-gradient(135deg,#463229,#291f1a 65%);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:24px}
.hero:after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;background:rgba(243,200,91,.09);right:-75px;top:-100px}
.hero h2{margin:0 0 10px;font-size:clamp(30px,5vw,48px)}.hero p{margin:0;color:var(--muted);max-width:720px;font-size:17px}.heroEmoji{font-size:86px;z-index:1}
.sectionHead{display:flex;align-items:end;justify-content:space-between;gap:15px;margin:28px 0 14px}.sectionHead h2{margin:0;font-size:28px}.sectionHead p{margin:5px 0 0;color:var(--muted)}
.profileGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:17px}
.profileCard{border:2px solid transparent;background:var(--panel);color:var(--text);border-radius:24px;padding:24px;text-align:center;box-shadow:var(--shadow);transition:.18s}
.profileCard:hover{transform:translateY(-3px);border-color:rgba(243,200,91,.65)}.avatar{width:98px;height:98px;border-radius:50%;margin:0 auto 14px;display:grid;place-items:center;font-size:52px;background:var(--panel3)}
.profileCard h3{font-size:24px;margin:0}.muted{color:var(--muted)}
.chipGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:16px}
.chip{min-height:150px;border:0;border-radius:24px;padding:21px;text-align:left;color:#251b15;box-shadow:var(--shadow);position:relative;overflow:hidden}
.chip:after{content:"";position:absolute;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.17);right:-35px;bottom:-45px}
.chip.one{background:var(--gold)}.chip.two{background:var(--mint)}.chip.bonus{background:var(--blue)}.chip b{font-size:24px;display:block}.chip span{display:block;margin-top:8px;font-weight:800}
.categoryRow{display:flex;gap:10px;overflow:auto;padding:2px 0 9px;scrollbar-width:none}.categoryRow::-webkit-scrollbar{display:none}.pill{border:0;border-radius:999px;padding:10px 16px;background:var(--panel3);color:var(--text);white-space:nowrap}.pill.active{background:var(--gold);color:#2a211a;font-weight:900}
.searchbar{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}.searchbar input{flex:1;min-width:220px}
.shelf{margin-top:24px}.shelfTitle{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.shelfTitle h3{margin:0;font-size:23px}
.carousel{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(230px,26vw);gap:15px;overflow-x:auto;padding:2px 3px 15px;scroll-snap-type:x proximity;scrollbar-width:none}.carousel::-webkit-scrollbar{display:none}
.collectionCard,.episodeCard{position:relative;background:var(--panel);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);scroll-snap-align:start;transition:.18s}.collectionCard:hover,.episodeCard:hover{transform:translateY(-3px)}
.cover{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#0a0a0a}.cardBody{padding:14px}.cardBody h3,.cardBody h4{margin:0}.cardBody p{margin:6px 0 0;color:var(--muted);font-size:13px}.overlayBtn{position:absolute;inset:0;border:0;background:transparent}
.badge{position:absolute;left:12px;top:12px;padding:7px 10px;border-radius:999px;background:rgba(28,21,18,.88);font-weight:900;font-size:12px}.favoriteBtn{position:absolute;right:12px;top:12px;z-index:3}.favoriteBtn.active{background:var(--gold);color:#2b211a}
.episodeGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:17px}.empty{padding:30px;border-radius:22px;background:var(--panel);color:var(--muted);text-align:center}
.breadcrumb{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.modalBack{position:fixed;inset:0;background:rgba(0,0,0,.75);display:grid;place-items:center;padding:18px;z-index:100}
.modal{width:min(1120px,100%);max-height:92vh;overflow:auto;border-radius:27px;background:var(--panel);box-shadow:var(--shadow);padding:22px}.modalHead{display:flex;justify-content:space-between;align-items:center;gap:14px}.modal h2{margin:0}
.adminTabs{display:flex;gap:9px;overflow:auto;margin:18px 0 14px}.adminTabs button{white-space:nowrap}
.form{display:grid;gap:14px}.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{display:grid;gap:7px;color:var(--muted);font-size:14px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#201713;color:var(--text);padding:12px}textarea{min-height:90px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
.adminGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(285px,1fr));gap:15px}.panel{background:var(--panel2);border-radius:20px;padding:17px}.panel h3{margin:0 0 12px}
.list{display:grid;gap:9px}.listItem{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#211814;border-radius:14px;padding:12px}.listItem small{color:var(--muted)}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.stat{background:#211814;border-radius:16px;padding:18px}.stat b{font-size:28px;display:block}
.playerScreen{position:fixed;inset:0;background:#000;z-index:150;display:flex;flex-direction:column;padding:calc(10px + env(safe-area-inset-top)) 12px calc(10px + env(safe-area-inset-bottom));gap:10px}
.playerTop{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.timer{border-radius:999px;background:var(--gold);color:#261d18;padding:9px 14px;font-weight:950}.playerWrap{flex:1;min-height:0}.playerWrap iframe{width:100%;height:100%;border:0}
.toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:200;background:#fff;color:#251b16;padding:12px 16px;border-radius:14px;box-shadow:var(--shadow)}
.setup{max-width:760px;margin:8vh auto 0}.dots{display:flex;gap:8px;margin-bottom:18px}.dot{height:7px;flex:1;border-radius:999px;background:var(--panel3)}.dot.active{background:var(--gold)}
.updateBanner{margin-bottom:14px;padding:13px 15px;border-radius:16px;background:var(--blue);color:#122126;font-weight:850;display:flex;justify-content:space-between;align-items:center;gap:12px}
@media(max-width:760px){
  .app{padding-left:12px;padding-right:12px}.brand h1{font-size:29px}.logo{font-size:39px}.hero{padding:22px}.heroEmoji{font-size:62px}
  .formGrid{grid-template-columns:1fr}.carousel{grid-auto-columns:78vw}.episodeGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.cardBody{padding:11px}.cardBody h3,.cardBody h4{font-size:15px}
}
</style>
</head>
<body>
<noscript><div style="padding:30px;color:white;background:#211914;font-family:system-ui">Bärflix benötigt JavaScript.</div></noscript>
<div id="app"></div>
<script>
(()=>{"use strict";
const APP_VERSION="4.0.0";
const KEY="baerflix.complete.v4";
const $=(s,r=document)=>r.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+"-"+Math.random();
const today=()=>new Date().toISOString().slice(0,10);
const isWeekend=()=>[0,6].includes(new Date().getDay());
const fmt=s=>`${String(Math.floor(Math.max(0,s)/60)).padStart(2,"0")}:${String(Math.floor(Math.max(0,s)%60)).padStart(2,"0")}`;
const defaults={
  version:APP_VERSION,
  settings:{pinHash:"",pinSalt:"",categories:["Für Ludwig","Serien","Fahrzeuge","Wissen & Technik","Tiere","Musik","Gute Nacht"],updateVersion:APP_VERSION},
  kids:[],collections:[{"id":"col-blaze","title":"Blaze und die Monster-Maschinen","category":"Fahrzeuge","coverId":"97AiQrxpca4","audience":["ludwig"],"episodes":[{"id":"blaze-1","youtubeId":"uPjeikJPATo","title":"Blaze stellt die Naschzeug-Diebin","order":0},{"id":"blaze-2","youtubeId":"ePqD4j_3nj4","title":"Die Recycling-Kraft","order":1},{"id":"blaze-3","youtubeId":"uJZvFsPkcOI","title":"Die Power-Reifen","order":2},{"id":"blaze-4","youtubeId":"t3Ma4ucdK7s","title":"Ninja Blaze","order":3},{"id":"blaze-5","youtubeId":"AvbtG7JhFH4","title":"Blazes fantastische Geschichten","order":4},{"id":"blaze-6","youtubeId":"iIAKh5vyyW4","title":"Blazes Weltraumabenteuer","order":5},{"id":"blaze-7","youtubeId":"ilzaZ7znCL8","title":"Das Dschungelhorn","order":6},{"id":"blaze-8","youtubeId":"bh32Yc5xMuI","title":"Die Backkatastrophe","order":7}]},{"id":"col-tautropfen","title":"Die Tautropfentagebücher","category":"Serien","coverId":"3W8JYqi-HgQ","audience":["ludwig"],"episodes":[{"id":"tau-1","youtubeId":"B23wSpAmWHo","title":"Das große Seifenblasenproblem","order":0},{"id":"tau-2","youtubeId":"TRdg_1vcqs4","title":"Briefabenteuer – eine besondere Lieferung","order":1},{"id":"tau-3","youtubeId":"C5zu9tRD7N8","title":"Sparschweinchenprobleme","order":2},{"id":"tau-4","youtubeId":"caVwaWK-xLo","title":"Die Feen bringen einen Hund zum Park","order":3},{"id":"tau-5","youtubeId":"Qme-9f8eXq8","title":"Die Tautropfen retten Harpers Fußballspiel","order":4},{"id":"tau-6","youtubeId":"77xV2Bn_cbU","title":"Ein Handy benutzen, das größer ist als du","order":5},{"id":"tau-7","youtubeId":"Z0pN9zu7qag","title":"Unternehmen Zahnfee","order":6},{"id":"tau-8","youtubeId":"4Saw_KbPcvg","title":"Die Feen entdecken eine neue Art zu fliegen","order":7}]},{"id":"col-fixies","title":"Die Fixies","category":"Wissen & Technik","coverId":"9bjc7fvP_wI","audience":["ludwig"],"episodes":[{"id":"fix-1","youtubeId":"9bjc7fvP_wI","title":"Das Fixiefon","order":0},{"id":"fix-2","youtubeId":"wQu_9ZJ7yVw","title":"Tom Thomas entdeckt die Kraft der Sonne","order":1},{"id":"fix-3","youtubeId":"uV89n_-DtY0","title":"Tom wird in einem Computervirus gefangen","order":2},{"id":"fix-4","youtubeId":"keBiLP_v-WY","title":"Unsichtbare Tinte","order":3},{"id":"fix-5","youtubeId":"U8qKFDUOH3U","title":"Seine Hose ist kaputt","order":4},{"id":"fix-6","youtubeId":"lR_U1KID1K4","title":"Die schwebenden Zauberbücher","order":5},{"id":"fix-7","youtubeId":"0qJ9rHL9aIQ","title":"Staffel 3 – komplette Sammlung","order":6},{"id":"fix-8","youtubeId":"HWJnkFYdi5c","title":"Staffel 2 – komplette Sammlung","order":7}]},{"id":"col-hotwheels","title":"Hot Wheels Let's Race","category":"Fahrzeuge","coverId":"KNYlz2JZgkw","audience":["ludwig"],"episodes":[{"id":"hot-1","youtubeId":"uCsARCroJiI","title":"Außer Kontrolle","order":0},{"id":"hot-2","youtubeId":"3VpwxF2dn9I","title":"Drachen-Showdown: Gemeinsam zum Sieg","order":1},{"id":"hot-3","youtubeId":"wcoJPLIAks0","title":"Ultimative Garagenübernahme","order":2},{"id":"hot-4","youtubeId":"8H3ex9pOlD8","title":"Ballonrettung: Coops große Rettung","order":3},{"id":"hot-5","youtubeId":"KNYlz2JZgkw","title":"Das Rennen um 500 Pizzen","order":4},{"id":"hot-6","youtubeId":"rbzK9OI3oAA","title":"Titelsong zum Mitsingen","order":5}]}],favorites:{},history:[],chips:{},usage:[]
};
let state=load(),screen=state.kids.length?"profiles":"setup",selectedKid=null,allowance=null,activeCategory="Alle",activeCollection=null,searchText="",modal=null,player=null,toastTimer=null;
window.adminTab="overview";

function migrate(raw){
  const s=Object.assign(structuredClone(defaults),raw||{});
  s.settings=Object.assign({},defaults.settings,raw?.settings||{});
  s.settings.categories=s.settings.categories||raw?.categories||defaults.settings.categories;
  s.kids=(s.kids||[]).map(k=>Object.assign({weekdayMinutes:12,weekendMinutes:15,color:"#f3c85b",avatar:"🐻"},k));
  s.collections=(s.collections&&s.collections.length?s.collections:structuredClone(defaults.collections));
  s.collections=s.collections.map(c=>Object.assign({audience:["all"]},c));
  s.favorites=s.favorites||{};
  s.history=s.history||[];
  s.chips=s.chips||{};
  s.usage=s.usage||[];
  s.version=APP_VERSION;
  return s
}
function load(){try{return migrate(JSON.parse(localStorage.getItem(KEY)||"{}"))}catch{return structuredClone(defaults)}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function mutate(fn){fn(state);save();render()}
function categories(){return state.settings.categories}
function minutesFor(kid){return isWeekend()?(kid.weekendMinutes||15):(kid.weekdayMinutes||12)}
function chipState(kidId){
  let c=state.chips[kidId];
  if(!c||c.date!==today()){c={date:today(),used:{one1:false,one2:false,two:false},bonus:c?.bonus||0};state.chips[kidId]=c;save()}
  return c
}
function getVideoId(url=""){const m=String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{6,})/);return m?.[1]||String(url).trim()}
const thumb=id=>`https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
async function hashPin(pin,saltB64){
  const enc=new TextEncoder();
  const salt=saltB64?Uint8Array.from(atob(saltB64),c=>c.charCodeAt(0)):crypto.getRandomValues(new Uint8Array(16));
  const key=await crypto.subtle.importKey("raw",enc.encode(pin),"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt,iterations:150000,hash:"SHA-256"},key,256);
  return{hash:btoa(String.fromCharCode(...new Uint8Array(bits))),salt:btoa(String.fromCharCode(...salt))}
}
function showToast(t){clearTimeout(toastTimer);let el=$("#toast");if(!el){el=document.createElement("div");el.id="toast";el.className="toast";document.body.appendChild(el)}el.textContent=t;toastTimer=setTimeout(()=>el.remove(),2600)}
function shell(content){
  const update=state.settings.updateVersion!==APP_VERSION?`<div class="updateBanner"><span>Eine neue Bärflix-Version ist verfügbar.</span><button class="btn" data-act="reload">Neu laden</button></div>`:"";
  return `<div class="app"><div class="wrap">${update}<header class="topbar"><div class="brand"><div class="logo">🐻</div><div><h1>Bärflix</h1><small>Unser Familienkino · v${APP_VERSION}</small></div></div>${screen!=="setup"?'<button class="btn ghost" data-act="login">Elternbereich</button>':""}</header><main>${content}</main></div></div>`
}
function hero(title,text,emoji){return `<section class="hero"><div><h2>${esc(title)}</h2><p>${esc(text)}</p></div><div class="heroEmoji">${emoji}</div></section>`}
function render(){
  let content="";
  if(screen==="setup")content=setupView();
  if(screen==="profiles")content=profilesView();
  if(screen==="chips")content=chipsView();
  if(screen==="library")content=libraryView();
  if(screen==="collection")content=collectionView();
  $("#app").innerHTML=shell(content)+(modal?modalView():"")+(player?playerView():"");
  bind()
}
function setupView(){
  return `<div class="setup">${hero("Willkommen bei Bärflix","Lege Eltern-PIN und erstes Kinderprofil an.","🐻🍿")}
  <div class="panel" style="margin-top:18px"><div class="formGrid">
  <label>Eltern-PIN<input id="setupPin" type="password" inputmode="numeric" placeholder="mindestens 4 Ziffern"></label>
  <label>Name des Kindes<input id="setupName" value="Ludwig" placeholder="z. B. Ludwig"></label>
  <label>Avatar<select id="setupAvatar"><option>🐻</option><option>🦊</option><option>🐼</option><option>🦁</option><option>🐯</option><option>🐨</option><option>🐶</option><option>🦖</option></select></label>
  <label>Profilfarbe<input id="setupColor" type="color" value="#f3c85b"></label>
  <label>Minuten werktags<input id="setupWeekday" type="number" min="1" value="12"></label>
  <label>Minuten am Wochenende<input id="setupWeekend" type="number" min="1" value="15"></label><label style="display:flex;grid-template-columns:auto 1fr;align-items:center;gap:10px"><input id="setupFabian" type="checkbox" checked style="width:auto"> Zusätzlich ein leeres Profil für Fabian anlegen</label></div>
  <div class="actions"><button class="btn primary" data-act="setupSave">Bärflix starten</button></div></div></div>`
}
function profilesView(){
  return `${hero("Wer schaut heute?","Wähle ein Profil. Danach suchst du einen Chip aus.","🍿")}
  <div class="sectionHead"><div><h2>Profile</h2><p>Einfach antippen</p></div></div>
  <div class="profileGrid">${state.kids.map(k=>`<button class="profileCard" data-kid="${k.id}" style="border-color:${k.color}55"><div class="avatar" style="background:${k.color}33">${k.avatar}</div><h3>${esc(k.name)}</h3><div class="muted">${minutesFor(k)} Minuten pro Folge</div></button>`).join("")}</div>`
}
function chipsView(){
  const c=chipState(selectedKid.id),m=minutesFor(selectedKid);
  const chip=(key,label,min,cls)=>`<button class="chip ${cls}" data-chip="${key}" data-min="${min}" ${c.used[key]?"disabled":""}><b>${label}</b><span>${min} Minuten</span></button>`;
  return `<button class="btn ghost" data-act="profiles">← Profile</button>${hero(`${selectedKid.name}, welchen Chip möchtest du?`,"Die Zeit läuft nur, während das Video wirklich abgespielt wird.",selectedKid.avatar)}
  <div class="sectionHead"><div><h2>Deine Chips</h2><p>Heute gilt: ${m} Minuten pro Folge.</p></div></div>
  <div class="chipGrid">${chip("one1","⭐ Eine Folge",m,"one")}${chip("one2","⭐ Eine Folge",m,"one")}${chip("two","⭐⭐ Zwei Folgen",m*2,"two")}
  <button class="chip bonus" data-chip="bonus" data-min="${m}" ${c.bonus<1?"disabled":""}><b>🌈 Bonuschip</b><span>${c.bonus} verfügbar · ${m} Minuten</span></button></div>`
}
function visibleCollections(){return state.collections.filter(c=>!selectedKid||!c.audience||c.audience.includes("all")||c.audience.includes(selectedKid.id))}
function allEpisodes(){return visibleCollections().flatMap(c=>c.episodes.map(e=>Object.assign({collectionId:c.id,collectionTitle:c.title,category:c.category},e)))}
function filteredEpisodes(){
  const q=searchText.trim().toLowerCase();
  return allEpisodes().filter(e=>(activeCategory==="Alle"||e.category===activeCategory)&&(!q||e.title.toLowerCase().includes(q)||e.collectionTitle.toLowerCase().includes(q)))
}
function libraryView(){
  const cats=["Alle",...categories()],cols=visibleCollections().filter(c=>(activeCategory==="Alle"||c.category===activeCategory)&&(!searchText||c.title.toLowerCase().includes(searchText.toLowerCase())||c.episodes.some(e=>e.title.toLowerCase().includes(searchText.toLowerCase()))));
  const favIds=state.favorites[selectedKid.id]||[],favEpisodes=allEpisodes().filter(e=>favIds.includes(e.id));
  const recent=state.history.filter(h=>h.kidId===selectedKid.id).slice(0,10).map(h=>allEpisodes().find(e=>e.id===h.episodeId)).filter(Boolean);
  return `<button class="btn ghost" data-act="chips">← Chips</button>
  <div class="sectionHead"><div><h2>Was möchtest du heute schauen?</h2><p>${esc(selectedKid.name)} · ${fmt(allowance.remaining)} verfügbar</p></div><button class="btn mint" data-act="random">🎲 Überrasch mich</button></div>
  <div class="searchbar"><input id="searchInput" value="${esc(searchText)}" placeholder="Serien oder Folgen suchen"><button class="btn" data-act="search">Suchen</button><button class="btn ghost" data-act="clearSearch">Leeren</button></div>
  <div class="categoryRow">${cats.map(c=>`<button class="pill ${activeCategory===c?"active":""}" data-category="${esc(c)}">${esc(c)}</button>`).join("")}</div>
  ${recent.length?shelfEpisodes("Zuletzt geschaut",recent):""}${favEpisodes.length?shelfEpisodes("Favoriten",favEpisodes):""}
  <div class="shelf"><div class="shelfTitle"><h3>Für dich ausgewählt</h3></div>${cols.length?`<div class="carousel">${cols.map(collectionCard).join("")}</div>`:'<div class="empty">Für dieses Profil sind noch keine Serien freigegeben. Im Elternbereich kannst du Inhalte hinzufügen oder sichtbar machen.</div>'}</div>`
}
function collectionCard(c){const cover=c.coverId||c.episodes[0]?.youtubeId||"";return `<article class="collectionCard"><img class="cover" src="${cover?thumb(cover):""}" alt=""><span class="badge">${esc(c.category)}</span><div class="cardBody"><h3>${esc(c.title)}</h3><p>${c.episodes.length} Folge${c.episodes.length===1?"":"n"}</p></div><button class="overlayBtn" data-collection="${c.id}"></button></article>`}
function shelfEpisodes(title,eps){return `<div class="shelf"><div class="shelfTitle"><h3>${esc(title)}</h3></div><div class="carousel">${eps.map(episodeCard).join("")}</div></div>`}
function episodeCard(e){const fav=(state.favorites[selectedKid.id]||[]).includes(e.id);return `<article class="episodeCard"><img class="cover" src="${thumb(e.youtubeId)}" alt=""><button class="btn icon favoriteBtn ${fav?"active":""}" data-fav="${e.id}">${fav?"★":"☆"}</button><div class="cardBody"><h4>${esc(e.title)}</h4><p>${esc(e.collectionTitle||"")}</p></div><button class="overlayBtn" data-play="${e.id}"></button></article>`}
function collectionView(){
  const c=visibleCollections().find(x=>x.id===activeCollection);if(!c){screen="library";return libraryView()}
  const eps=c.episodes.map(e=>Object.assign({collectionTitle:c.title},e));
  return `<div class="breadcrumb"><button class="btn ghost" data-act="library">← Mediathek</button><span class="muted">${esc(c.category)}</span></div>${hero(c.title,`${c.episodes.length} Folge${c.episodes.length===1?"":"n"}`,"🎬")}
  <div class="sectionHead"><div><h2>Folgen</h2><p>Tippen und anschauen</p></div></div><div class="episodeGrid">${eps.length?eps.map(episodeCard).join(""):'<div class="empty">Noch keine Folgen vorhanden.</div>'}</div>`
}
function modalView(){
  if(modal==="login")return `<div class="modalBack"><div class="modal"><div class="modalHead"><h2>Elternbereich</h2><button class="btn ghost" data-act="closeModal">Schließen</button></div><div class="form" style="margin-top:18px"><label>PIN<input id="loginPin" type="password" inputmode="numeric" autofocus></label></div><div class="actions"><button class="btn primary" data-act="unlock">Öffnen</button></div></div></div>`;
  if(modal==="admin")return adminView();return ""
}
function adminView(){
  const tab=window.adminTab||"overview",tabs=[["overview","Übersicht"],["collections","Serien"],["episodes","Folgen"],["kids","Kinder"],["categories","Kategorien"],["settings","Einstellungen"],["stats","Statistik"],["backup","Backup"]];
  return `<div class="modalBack"><div class="modal"><div class="modalHead"><div><h2>Elternbereich</h2><div class="muted">Alle Daten bleiben auf diesem Gerät.</div></div><button class="btn ghost" data-act="closeModal">Schließen</button></div>
  <div class="adminTabs">${tabs.map(t=>`<button class="btn ${tab===t[0]?"primary":""}" data-tab="${t[0]}">${t[1]}</button>`).join("")}</div>${adminTabView(tab)}</div></div>`
}
function adminTabView(tab){
  if(tab==="overview")return `<div class="adminGrid"><section class="panel"><h3>📺 Inhalte</h3><p class="muted">${state.collections.length} Sammlungen · ${allEpisodes().length} Folgen</p></section><section class="panel"><h3>👧 Profile</h3><p class="muted">${state.kids.length} Kinderprofile</p></section><section class="panel"><h3>⏱️ Nutzung</h3><p class="muted">${Math.round(state.usage.reduce((a,u)=>a+u.seconds,0)/60)} Minuten insgesamt</p></section></div>`;
  if(tab==="collections")return `<div class="formGrid"><label>Titel<input id="colTitle" placeholder="z. B. Feuerwehr Sam"></label><label>Kategorie<select id="colCat">${categories().map(c=>`<option>${esc(c)}</option>`).join("")}</select></label><label>Optionales Vorschaubild: YouTube-Link<input id="colCover" placeholder="leer = erste Folge"></label><label>Sichtbar für<select id="colAudience"><option value="all">Alle Kinder</option>${state.kids.map(k=>`<option value="${k.id}">${esc(k.name)}</option>`).join("")}</select></label></div><div class="actions"><button class="btn primary" data-act="addCollection">Sammlung anlegen</button></div>
  <div class="list" style="margin-top:18px">${state.collections.map(c=>`<div class="listItem"><span><b>${esc(c.title)}</b><br><small>${esc(c.category)} · ${c.episodes.length} Folgen</small></span><span><button class="btn" data-editcol="${c.id}">Bearbeiten</button> <button class="btn danger" data-delcol="${c.id}">Löschen</button></span></div>`).join("")||'<div class="empty">Noch keine Sammlungen.</div>'}</div>`;
  if(tab==="episodes")return `<div class="form"><label>Sammlung<select id="epCollection">${state.collections.map(c=>`<option value="${c.id}">${esc(c.title)}</option>`).join("")}</select></label><label>YouTube-Link<input id="epUrl" placeholder="https://youtu.be/..."></label><label>Titel<input id="epTitle" placeholder="Titel der Folge"></label></div><div class="actions"><button class="btn primary" data-act="fetchTitle">Titel automatisch holen</button><button class="btn mint" data-act="addEpisode">Folge hinzufügen</button></div>
  <div class="list" style="margin-top:18px">${state.collections.flatMap(c=>c.episodes.map(e=>`<div class="listItem"><span><b>${esc(e.title)}</b><br><small>${esc(c.title)}</small></span><span><button class="btn" data-editep="${e.id}">Bearbeiten</button> <button class="btn danger" data-delep="${e.id}">Löschen</button></span></div>`)).join("")||'<div class="empty">Noch keine Folgen.</div>'}</div>`;
  if(tab==="kids")return `<div class="formGrid"><label>Name<input id="kidName"></label><label>Avatar<select id="kidAvatar"><option>🐻</option><option>🦊</option><option>🐼</option><option>🦁</option><option>🐯</option><option>🐨</option><option>🐶</option><option>🦖</option></select></label><label>Profilfarbe<input id="kidColor" type="color" value="#f3c85b"></label><label>Minuten werktags<input id="kidWeekday" type="number" min="1" value="12"></label><label>Minuten Wochenende<input id="kidWeekend" type="number" min="1" value="15"></label></div><div class="actions"><button class="btn primary" data-act="addKid">Kind hinzufügen</button></div>
  <div class="list" style="margin-top:18px">${state.kids.map(k=>`<div class="listItem"><span>${k.avatar} <b>${esc(k.name)}</b><br><small>${k.weekdayMinutes} Min werktags · ${k.weekendMinutes} Min Wochenende</small></span><span><button class="btn" data-editkid="${k.id}">Bearbeiten</button> <button class="btn" data-bonus="${k.id}">+ Bonus</button> <button class="btn" data-reset="${k.id}">Reset</button> <button class="btn danger" data-delkid="${k.id}">Löschen</button></span></div>`).join("")}</div>`;
  if(tab==="categories")return `<div class="formGrid"><label>Neue Kategorie<input id="newCategory" placeholder="z. B. Gute Nacht"></label></div><div class="actions"><button class="btn primary" data-act="addCategory">Hinzufügen</button></div><div class="list" style="margin-top:18px">${categories().map(c=>`<div class="listItem"><b>${esc(c)}</b><button class="btn danger" data-delcat="${esc(c)}">Löschen</button></div>`).join("")}</div>`;
  if(tab==="settings")return `<div class="form"><label>Neue Eltern-PIN<input id="newPin" type="password" inputmode="numeric" placeholder="leer lassen = unverändert"></label><label>Versionshinweis simulieren<input id="updateVersion" value="${esc(state.settings.updateVersion)}"></label></div><div class="actions"><button class="btn mint" data-act="saveSettings">Speichern</button></div>`;
  if(tab==="stats"){
    const total=Math.round(state.usage.reduce((a,u)=>a+u.seconds,0)/60),todayMin=Math.round(state.usage.filter(u=>u.date===today()).reduce((a,u)=>a+u.seconds,0)/60);
    return `<div class="statsGrid"><div class="stat"><b>${total}</b><span>Minuten insgesamt</span></div><div class="stat"><b>${todayMin}</b><span>Minuten heute</span></div><div class="stat"><b>${state.history.length}</b><span>Starts gespeichert</span></div></div>
    <div class="list" style="margin-top:18px">${state.kids.map(k=>{const mins=Math.round(state.usage.filter(u=>u.kidId===k.id).reduce((a,u)=>a+u.seconds,0)/60);return `<div class="listItem"><span>${k.avatar} <b>${esc(k.name)}</b></span><span>${mins} Minuten</span></div>`}).join("")}</div>`;
  }
  return `<section class="panel"><h3>💾 Sicherung</h3><p class="muted">Exportiert Profile, Serien, Folgen, Favoriten, Chips, Nutzung und Einstellungen.</p><div class="actions"><button class="btn" data-act="export">Backup exportieren</button><label class="btn">Backup importieren<input id="importFile" hidden type="file" accept=".json"></label><button class="btn danger" data-act="factoryReset">Alles zurücksetzen</button></div></section>`
}
function playerView(){const e=allEpisodes().find(x=>x.id===player.episodeId);return `<div class="playerScreen"><div class="playerTop"><button class="btn ghost" data-act="closePlayer">← Zurück</button><div class="timer" id="timer">${fmt(allowance.remaining)}</div><button class="btn primary" data-act="fullscreen">⛶ Vollbild</button></div><div class="playerWrap"><iframe id="yt" src="https://www.youtube-nocookie.com/embed/${e.youtubeId}?autoplay=1&playsinline=1&rel=0&modestbranding=1&enablejsapi=1&origin=${encodeURIComponent(location.origin)}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe></div></div>`}
function bind(){
  document.querySelectorAll("[data-act]").forEach(b=>b.onclick=()=>act(b.dataset.act));
  document.querySelectorAll("[data-kid]").forEach(b=>b.onclick=()=>{selectedKid=state.kids.find(k=>k.id===b.dataset.kid);screen="chips";render()});
  document.querySelectorAll("[data-chip]").forEach(b=>b.onclick=()=>{allowance={type:b.dataset.chip,remaining:Number(b.dataset.min)*60};screen="library";render()});
  document.querySelectorAll("[data-category]").forEach(b=>b.onclick=()=>{activeCategory=b.dataset.category;render()});
  document.querySelectorAll("[data-collection]").forEach(b=>b.onclick=()=>{activeCollection=b.dataset.collection;screen="collection";render()});
  document.querySelectorAll("[data-play]").forEach(b=>b.onclick=()=>startPlayer(b.dataset.play));
  document.querySelectorAll("[data-fav]").forEach(b=>b.onclick=e=>{e.stopPropagation();toggleFav(b.dataset.fav)});
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{window.adminTab=b.dataset.tab;render()});
  document.querySelectorAll("[data-delcol]").forEach(b=>b.onclick=()=>delCollection(b.dataset.delcol));
  document.querySelectorAll("[data-delep]").forEach(b=>b.onclick=()=>delEpisode(b.dataset.delep));
  document.querySelectorAll("[data-bonus]").forEach(b=>b.onclick=()=>bonus(b.dataset.bonus));
  document.querySelectorAll("[data-reset]").forEach(b=>b.onclick=()=>resetChips(b.dataset.reset));
  document.querySelectorAll("[data-delkid]").forEach(b=>b.onclick=()=>delKid(b.dataset.delkid));
  document.querySelectorAll("[data-editkid]").forEach(b=>b.onclick=()=>editKid(b.dataset.editkid));
  document.querySelectorAll("[data-editcol]").forEach(b=>b.onclick=()=>editCollection(b.dataset.editcol));
  document.querySelectorAll("[data-editep]").forEach(b=>b.onclick=()=>editEpisode(b.dataset.editep));
  document.querySelectorAll("[data-delcat]").forEach(b=>b.onclick=()=>delCategory(b.dataset.delcat));
  const f=$("#importFile");if(f)f.onchange=importBackup
}
async function act(a){
  if(a==="setupSave"){const pin=$("#setupPin").value,name=$("#setupName").value.trim();if(pin.length<4)return showToast("PIN mindestens vier Ziffern");if(!name)return showToast("Bitte einen Namen eingeben");const h=await hashPin(pin);state.settings.pinHash=h.hash;state.settings.pinSalt=h.salt;state.kids.push({id:"ludwig",name,avatar:$("#setupAvatar").value,color:$("#setupColor").value,weekdayMinutes:+$("#setupWeekday").value||12,weekendMinutes:+$("#setupWeekend").value||15});if($("#setupFabian")?.checked)state.kids.push({id:"fabian",name:"Fabian",avatar:"🦊",color:"#8fc39a",weekdayMinutes:10,weekendMinutes:12});save();screen="profiles";render()}
  if(a==="login"){modal="login";render()}
  if(a==="closeModal"){modal=null;render()}
  if(a==="unlock"){const pin=$("#loginPin").value,h=await hashPin(pin,state.settings.pinSalt);if(h.hash===state.settings.pinHash){modal="admin";window.adminTab="overview";render()}else showToast("PIN nicht korrekt")}
  if(a==="profiles"){screen="profiles";selectedKid=null;render()}
  if(a==="chips"){screen="chips";activeCollection=null;render()}
  if(a==="library"){screen="library";render()}
  if(a==="search"){searchText=$("#searchInput").value;render()}
  if(a==="clearSearch"){searchText="";render()}
  if(a==="random"){const eps=filteredEpisodes();if(!eps.length)return showToast("Keine passenden Folgen vorhanden");startPlayer(eps[Math.floor(Math.random()*eps.length)].id)}
  if(a==="addCollection"){const title=$("#colTitle").value.trim(),category=$("#colCat").value,coverId=getVideoId($("#colCover").value);if(!title)return showToast("Bitte Titel eingeben");const audience=$("#colAudience")?.value||"all";mutate(s=>s.collections.push({id:uid(),title,category,coverId,audience:[audience],episodes:[]}));showToast("Sammlung angelegt")}
  if(a==="fetchTitle")fetchTitle()
  if(a==="addEpisode")addEpisode()
  if(a==="addKid"){const name=$("#kidName").value.trim();if(!name)return showToast("Bitte Namen eingeben");mutate(s=>s.kids.push({id:uid(),name,avatar:$("#kidAvatar").value,color:$("#kidColor").value,weekdayMinutes:+$("#kidWeekday").value||12,weekendMinutes:+$("#kidWeekend").value||15}));showToast("Profil hinzugefügt")}
  if(a==="addCategory"){const c=$("#newCategory").value.trim();if(!c)return;mutate(s=>{if(!s.settings.categories.includes(c))s.settings.categories.push(c)});showToast("Kategorie hinzugefügt")}
  if(a==="saveSettings")saveSettings()
  if(a==="export")exportBackup()
  if(a==="factoryReset"){if(confirm("Wirklich alle Bärflix-Daten löschen?")){localStorage.removeItem(KEY);location.reload()}}
  if(a==="closePlayer"){stopTimer();player=null;render()}
  if(a==="fullscreen"){const el=$("#yt");(el.requestFullscreen||el.webkitRequestFullscreen)?.call(el)}
  if(a==="reload")location.reload()
}
function toggleFav(id){const arr=state.favorites[selectedKid.id]||(state.favorites[selectedKid.id]=[]);const i=arr.indexOf(id);i>=0?arr.splice(i,1):arr.push(id);save();render()}
async function fetchTitle(){
  const id=getVideoId($("#epUrl").value);if(!id)return showToast("Bitte YouTube-Link eingeben");
  try{const r=await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);if(!r.ok)throw 0;const j=await r.json();$("#epTitle").value=j.title||"";showToast("Titel übernommen")}catch{showToast("Titel konnte nicht automatisch geladen werden")}
}
function addEpisode(){const cid=$("#epCollection").value,id=getVideoId($("#epUrl").value),title=$("#epTitle").value.trim();if(!cid||!id||!title)return showToast("Sammlung, Link und Titel ausfüllen");mutate(s=>{const c=s.collections.find(x=>x.id===cid);c.episodes.push({id:uid(),youtubeId:id,title,order:c.episodes.length});if(!c.coverId)c.coverId=id});showToast("Folge hinzugefügt")}
function delCollection(id){if(!confirm("Sammlung und alle Folgen löschen?"))return;mutate(s=>s.collections=s.collections.filter(c=>c.id!==id))}
function delEpisode(id){if(!confirm("Folge löschen?"))return;mutate(s=>s.collections.forEach(c=>c.episodes=c.episodes.filter(e=>e.id!==id)))}
function bonus(id){mutate(s=>{const c=s.chips[id]||{date:today(),used:{one1:false,one2:false,two:false},bonus:0};c.bonus=(c.bonus||0)+1;s.chips[id]=c});showToast("Bonuschip vergeben")}
function resetChips(id){mutate(s=>s.chips[id]={date:today(),used:{one1:false,one2:false,two:false},bonus:s.chips[id]?.bonus||0});showToast("Chips zurückgesetzt")}
function delKid(id){if(state.kids.length===1)return showToast("Mindestens ein Profil muss bleiben");if(!confirm("Kinderprofil löschen?"))return;mutate(s=>s.kids=s.kids.filter(k=>k.id!==id))}
function editKid(id){const k=state.kids.find(x=>x.id===id),name=prompt("Name",k.name),wd=prompt("Minuten werktags",k.weekdayMinutes),we=prompt("Minuten Wochenende",k.weekendMinutes);if(name===null||wd===null||we===null)return;mutate(s=>{const x=s.kids.find(y=>y.id===id);x.name=name.trim()||x.name;x.weekdayMinutes=Math.max(1,+wd||x.weekdayMinutes);x.weekendMinutes=Math.max(1,+we||x.weekendMinutes)})}
function editCollection(id){const c=state.collections.find(x=>x.id===id),title=prompt("Titel",c.title),cat=prompt("Kategorie",c.category);if(title===null||cat===null)return;mutate(s=>{const x=s.collections.find(y=>y.id===id);x.title=title.trim()||x.title;x.category=cat.trim()||x.category})}
function editEpisode(id){const e=allEpisodes().find(x=>x.id===id),title=prompt("Titel",e.title),url=prompt("YouTube-Link oder Video-ID",e.youtubeId);if(title===null||url===null)return;mutate(s=>s.collections.forEach(c=>{const x=c.episodes.find(y=>y.id===id);if(x){x.title=title.trim()||x.title;x.youtubeId=getVideoId(url)||x.youtubeId}}))}
function delCategory(cat){if(state.collections.some(c=>c.category===cat))return showToast("Kategorie wird noch verwendet");mutate(s=>s.settings.categories=s.settings.categories.filter(c=>c!==cat))}
async function saveSettings(){const pin=$("#newPin").value,updateVersion=$("#updateVersion").value.trim()||APP_VERSION;let h=null;if(pin){if(pin.length<4)return showToast("PIN mindestens vier Ziffern");h=await hashPin(pin)}mutate(s=>{s.settings.updateVersion=updateVersion;if(h){s.settings.pinHash=h.hash;s.settings.pinSalt=h.salt}});showToast("Einstellungen gespeichert")}
function exportBackup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`baerflix-backup-${today()}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function importBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=migrate(JSON.parse(r.result));save();showToast("Backup importiert");render()}catch{showToast("Backup ungültig")}};r.readAsText(f)}
let timerInterval=null,lastTick=0;
function startPlayer(id){player={episodeId:id};const existing=state.history.filter(h=>h.episodeId!==id||h.kidId!==selectedKid.id);state.history=[{kidId:selectedKid.id,episodeId:id,at:Date.now()},...existing].slice(0,60);save();render();window.addEventListener("message",ytMessage)}
function ytMessage(ev){if(typeof ev.data!=="string")return;let d;try{d=JSON.parse(ev.data)}catch{return}if(d.event==="onStateChange"){if(d.info===1)startTimer();else stopTimer()}}
function startTimer(){stopTimer();lastTick=Date.now();timerInterval=setInterval(()=>{const now=Date.now(),delta=(now-lastTick)/1000;lastTick=now;allowance.remaining=Math.max(0,allowance.remaining-delta);state.usage.push({kidId:selectedKid.id,episodeId:player.episodeId,date:today(),seconds:delta});if(state.usage.length>5000)state.usage=state.usage.slice(-5000);save();const t=$("#timer");if(t)t.textContent=fmt(allowance.remaining);if(allowance.remaining<=0)expireAllowance()},1000)}
function stopTimer(){clearInterval(timerInterval);timerInterval=null}
function expireAllowance(){stopTimer();const c=chipState(selectedKid.id);if(allowance.type==="bonus")c.bonus=Math.max(0,c.bonus-1);else c.used[allowance.type]=true;save();player=null;allowance=null;screen="chips";render();showToast("Die Bärflix-Zeit ist abgelaufen.")}
window.addEventListener("error",e=>{console.error(e.error||e.message);showToast("Bärflix-Fehler – bitte Seite neu laden")});
render();
if("serviceWorker"in navigator&&location.protocol.startsWith("http"))window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js?v=3").catch(console.warn));
})();
</script>
</body>
</html>
