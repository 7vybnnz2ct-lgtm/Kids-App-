<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#69ccef">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
<title>Bärflix</title>
<style>
:root{
  --ink:#21465a;--muted:#607d8b;--sky:#6dcef1;--cream:#fffaf2;--yellow:#ffd75f;
  --pink:#ff9db7;--green:#89d291;--blue:#82cdf1;--purple:#a99bec;--red:#ff8c7d;
  --shadow:0 18px 42px rgba(30,79,103,.18);--shadow2:0 9px 22px rgba(30,79,103,.14);
  font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;color:var(--ink);background:#8bd5f2}
body{min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.world{position:fixed;inset:0;overflow:hidden;pointer-events:none;background:linear-gradient(#6dcdf1 0,#c8f0ff 61%,#a7dc8e 62%,#83c671 100%)}
.sun{position:absolute;right:7%;top:6%;width:92px;height:92px;border-radius:50%;background:#ffe778;box-shadow:0 0 50px rgba(255,238,140,.8)}
.cloud{position:absolute;width:140px;height:48px;border-radius:999px;background:rgba(255,255,255,.9);animation:cloud 30s linear infinite}
.cloud:before,.cloud:after{content:"";position:absolute;background:#fff;border-radius:50%}
.cloud:before{width:62px;height:62px;left:20px;top:-28px}.cloud:after{width:82px;height:82px;right:10px;top:-43px}
.c1{top:14%;left:-180px}.c2{top:30%;left:-260px;transform:scale(.7);animation-delay:-14s}
@keyframes cloud{to{translate:calc(100vw + 450px) 0}}
.hill{position:absolute;border-radius:50% 50% 0 0;background:#78bd69;bottom:-14%;height:34%;width:68%}
.h1{left:-15%}.h2{right:-20%;background:#63ad5f}.flowers{position:absolute;left:3%;right:3%;bottom:5%;font-size:28px;letter-spacing:28px;opacity:.8}
.app{position:relative;z-index:2;max-width:1180px;min-height:100vh;margin:auto;padding:max(14px,env(safe-area-inset-top)) 18px max(16px,env(safe-area-inset-bottom))}
.topbar{height:74px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand svg{width:58px;height:58px;filter:drop-shadow(0 8px 8px rgba(31,73,92,.2))}
.brandName{font-size:34px;font-weight:1000;letter-spacing:-1.5px}
.iconBtn,.backBtn{border:0;background:rgba(255,255,255,.92);color:var(--ink);box-shadow:var(--shadow2);display:grid;place-items:center}
.iconBtn{width:54px;height:54px;border-radius:18px;font-size:25px}
.backBtn{width:58px;height:58px;border-radius:20px;font-size:29px}
.iconBtn:active,.backBtn:active,.profile:active,.ticket:active,.filter:active,.series:active,.episode:active{transform:scale(.94)}
.main{padding:8px 0 26px}
.glass{background:rgba(255,255,255,.88);border:4px solid rgba(255,255,255,.62);border-radius:34px;box-shadow:var(--shadow);backdrop-filter:blur(13px)}
.profileIntro{display:grid;place-items:center;padding:16px 10px 2px}
.bigBear{font-size:102px;filter:drop-shadow(0 12px 10px rgba(40,74,91,.13));animation:bob 3.4s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-8px) rotate(3deg)}}
.profiles{display:grid;grid-template-columns:repeat(2,minmax(0,290px));justify-content:center;gap:24px;margin:18px auto 0}
.profile{border:5px solid rgba(255,255,255,.78);border-radius:38px;min-height:255px;background:linear-gradient(145deg,#fff,#e9f8ff);box-shadow:var(--shadow);color:var(--ink);padding:22px}
.profile:nth-child(2){background:linear-gradient(145deg,#fff,#fff0f5)}
.avatar{font-size:108px;line-height:1.1}.profileName{font-size:31px;font-weight:1000;margin-top:12px}
.ticketWrap{padding:22px;margin-top:14px}
.ticketHeader{display:flex;align-items:center;justify-content:center;min-height:90px;font-size:76px}
.tickets{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.ticket{border:5px solid rgba(255,255,255,.75);border-radius:36px;min-height:235px;display:grid;place-items:center;box-shadow:var(--shadow);font-size:92px;position:relative;overflow:hidden}
.ticket:after{content:"";position:absolute;left:-20%;right:-20%;height:45%;bottom:-24%;background:rgba(255,255,255,.34);border-radius:50%}
.ticket.short{background:linear-gradient(145deg,#ffeb8c,#ffc965)}.ticket.normal{background:linear-gradient(145deg,#ffbfd0,#ff8faa)}.ticket.bonus{background:linear-gradient(145deg,#b9ebff,#74c8ec)}
.kidBar{display:flex;align-items:center;gap:10px;margin:4px 0 16px}
.kidBubble{width:62px;height:62px;border-radius:22px;background:rgba(255,255,255,.92);display:grid;place-items:center;font-size:39px;box-shadow:var(--shadow2)}
.bearBubble{margin-left:auto;font-size:52px;animation:bob 3.4s ease-in-out infinite}
.filters{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 15px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter{flex:0 0 84px;height:84px;border:4px solid rgba(255,255,255,.8);border-radius:27px;background:rgba(255,255,255,.86);box-shadow:var(--shadow2);font-size:39px}
.filter.active{outline:6px solid rgba(255,216,92,.75);transform:translateY(-3px)}
.seriesGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.series{border:0;border-radius:30px;overflow:hidden;background:white;box-shadow:var(--shadow);padding:0;position:relative;aspect-ratio:16/11}
.series img{width:100%;height:100%;object-fit:cover;display:block}
.series:after{content:"▶";position:absolute;right:13px;bottom:13px;width:56px;height:56px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.93);color:#284b5e;font-size:25px;box-shadow:0 7px 18px rgba(23,61,79,.25);padding-left:4px}
.seriesTitle{position:absolute;left:0;right:0;bottom:0;padding:45px 70px 13px 14px;color:#fff;font-weight:1000;font-size:19px;text-align:left;background:linear-gradient(transparent,rgba(14,42,57,.83));text-shadow:0 2px 3px rgba(0,0,0,.35)}
.episodeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:19px}
.episode{border:0;border-radius:29px;overflow:hidden;background:#fff;box-shadow:var(--shadow);padding:0;position:relative;aspect-ratio:16/9}
.episode img{width:100%;height:100%;object-fit:cover;display:block}
.playCircle{position:absolute;inset:0;margin:auto;width:76px;height:76px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.94);font-size:34px;padding-left:5px;box-shadow:0 10px 25px rgba(19,54,71,.26)}
.favBtn{position:absolute;right:11px;top:11px;width:52px;height:52px;border:0;border-radius:18px;background:rgba(255,255,255,.93);font-size:25px;box-shadow:var(--shadow2)}
.emptyBear{display:grid;place-items:center;min-height:300px;font-size:100px}
.player{position:fixed;inset:0;z-index:500;background:#0e222c;display:grid;grid-template-rows:76px 1fr}
.playerTop{display:flex;align-items:center;padding:10px 14px;background:#102a36}
.player iframe{width:100%;height:100%;border:0}
.playerDone{position:absolute;inset:0;display:grid;place-items:center;background:linear-gradient(#6dcef1,#a7dc8e);font-size:100px}
.toast{position:fixed;left:50%;bottom:max(30px,env(safe-area-inset-bottom));translate:-50% 18px;background:#244b60;color:#fff;padding:12px 18px;border-radius:999px;font-weight:900;opacity:0;transition:.2s;pointer-events:none;z-index:800}
.toast.show{opacity:1;translate:-50% 0}
.overlay{position:fixed;inset:0;z-index:650;background:rgba(16,42,55,.58);backdrop-filter:blur(8px);display:grid;place-items:center;padding:18px}
.modal{width:min(850px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:31px;padding:24px;box-shadow:0 30px 90px rgba(0,0,0,.28)}
.modalHead{display:flex;align-items:center;gap:12px}.modalHead h2{margin:0;font-size:29px}.spacer{flex:1}
.btn{border:0;border-radius:17px;background:#edf5f8;color:var(--ink);padding:12px 15px;font-weight:900}.btn.primary{background:var(--yellow)}.btn.danger{background:#ffdce2}.btn.full{width:100%}
.form{display:grid;gap:13px;margin-top:18px}.field{display:grid;gap:6px}.field label{font-weight:900}.field input,.field select,.field textarea{border:2px solid #d9e7ed;border-radius:15px;padding:12px;background:#fbfdfe;width:100%}
.tabs{display:flex;gap:8px;overflow:auto;margin:18px 0}.tab.active{background:var(--yellow)}
.adminGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{padding:16px;border-radius:20px;background:#f1f8fa;text-align:center}.stat b{display:block;font-size:29px}
.adminList{display:grid;gap:10px}.adminItem{display:flex;gap:10px;align-items:center;padding:12px;background:#f1f7f9;border-radius:17px}.adminThumb{width:95px;aspect-ratio:16/10;border-radius:13px;object-fit:cover}.small{font-size:13px;color:var(--muted)}
.switch{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;background:#f1f7f9;border-radius:17px}
.stickerGrid{display:grid;grid-template-columns:repeat(6,1fr);gap:13px;margin-top:18px}.sticker{aspect-ratio:1;border-radius:22px;background:#eef4f7;border:3px dashed #bfd0d8;display:grid;place-items:center;font-size:43px}.sticker.on{background:linear-gradient(145deg,#fff3a8,#ffd3dd);border:3px solid white;box-shadow:var(--shadow2)}
@media(max-width:900px){.seriesGrid{grid-template-columns:repeat(3,1fr)}.episodeGrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){
 .app{padding-left:12px;padding-right:12px}.brandName{font-size:28px}.brand svg{width:49px;height:49px}.topbar{height:66px}
 .bigBear{font-size:82px}.profiles{gap:12px}.profile{min-height:205px;padding:13px}.avatar{font-size:78px}.profileName{font-size:24px}
 .ticketWrap{padding:14px}.tickets{gap:11px}.ticket{min-height:170px;font-size:66px;border-radius:28px}
 .filter{flex-basis:70px;height:70px;font-size:32px;border-radius:23px}.seriesGrid{grid-template-columns:repeat(2,1fr);gap:12px}
 .series{border-radius:23px}.seriesTitle{font-size:15px;padding:38px 55px 10px 11px}.series:after{width:45px;height:45px;font-size:20px;right:9px;bottom:9px}
 .episodeGrid{grid-template-columns:1fr 1fr;gap:12px}.episode{border-radius:22px}.playCircle{width:60px;height:60px;font-size:27px}.favBtn{width:44px;height:44px;font-size:21px}
 .modal{padding:18px;border-radius:25px}.adminGrid{grid-template-columns:1fr}.stickerGrid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="world">
  <div class="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div>
  <div class="hill h1"></div><div class="hill h2"></div><div class="flowers">🌼 🌸 🌼 🌷 🌼 🌸</div>
</div>
<div id="root"></div><div id="toast" class="toast"></div>
<script>
'use strict';

const VERSION='9.1.0';
const KEY='baerflix.v91';
const LEGACY=['baerflix.v9','baerflix.complete.v8','baerflix.complete.v7','baerflix.complete.v6'];
const STICKERS=['🌟','🚗','🚒','🐝','🦋','✈️','🚂','🎵','🌙','🍿','🐯','🧸'];

const CURATED=[

  ]},
  {id:'hotwheels',title:"Hot Wheels",emoji:'🏎️',category:'garage',source:'Hot Wheels Deutschland',episodes:[
    {id:'hot-pizza',title:'Das Rennen um 500 Pizzen',youtubeId:'KNYlz2JZgkw'},
    {id:'hot-city',title:'Ärger in Hot Wheels City',youtubeId:'5jJ89j5J_cc'},
    {id:'hot-countdown',title:'Countdown zum großen Rennen',youtubeId:'9uFQ8siwxKY'}
  ]},
  {id:'sam',title:'Feuerwehrmann Sam',emoji:'🚒',category:'garage',source:'Feuerwehrmann Sam – offizieller Kanal',episodes:[
    {id:'sam-paths',title:'Auf gefährlichen Pfaden',youtubeId:'QpxmwO75HwI'},
    {id:'sam-rescuers',title:'Die jungen Retter',youtubeId:'vuFDwO_sg2M'},

    {id:'sw-whale',title:'Jett und der Wal',youtubeId:'TjOyEoaXGwc'},
    {id:'sw-pumpkin',title:'Der rollende Riesenkürbis',youtubeId:'GTBe9EegFk4'},
    {id:'sw-space',title:'Hilfe im Weltall',youtubeId:'K7KI1jlznpQ'}
  ]},
  {id:'thomas',title:'Thomas & seine Freunde',emoji:'🚂',category:'garage',source:'Thomas & seine Freunde Deutschland',episodes:[
    {id:'thomas-chaos',title:'Alles wird chaotisch',youtubeId:'fTn9v2wZCuY'},
    {id:'thomas-ride',title:'Fahr mit Thomas mit',youtubeId:'YbtYL77L9gI'},
    {id:'thomas-adventure',title:'Los geht’s ins Abenteuer',youtubeId:'r9Ii9iBShV0'}
  ]},
  {id:'fixies',title:'Die Fixies',emoji:'🔧',category:'tree',source:'Die Fixies – offizieller Kanal',episodes:[
    {id:'fix-lever',title:'Der Hebel',youtubeId:'_o_x1oZgVB0'},
    {id:'fix-costume',title:'Das besondere Kostüm',youtubeId:'U8IehMa4qqw'},
    {id:'fix-lie',title:'Wer lügt hier?',youtubeId:'wpE_2ONdUnw'}
  ]},
  {id:'tautropfen',title:'Die Tautropfentagebücher',emoji:'🧚',category:'tree',source:'Netflix',episodes:[
    {id:'dew-letter',title:'Briefabenteuer',youtubeId:'TRdg_1vcqs4'},
    {id:'dew-piggy',title:'Sparschweinchenprobleme',youtubeId:'C5zu9tRD7N8'},
    {id:'dew-tooth',title:'Unternehmen Zahnfee',youtubeId:'Z0pN9zu7qag'}
  ]},
  {id:'daniel',title:'Tiger Daniel',emoji:'🐯',category:'bed',source:'Offizieller TOGGO-Kanal',episodes:[
    {id:'daniel-dragon',title:'Der Drachentanz',youtubeId:'yPBL-L0Z4S8'},
    {id:'daniel-crown',title:'Die schmutzige Krone',youtubeId:'NWAgXc8uaQY'},
    {id:'daniel-fair',title:'Der Jahrmarkt',youtubeId:'xEQqfUCGj7Q'}
  ]},
  {id:'bing',title:'Bing',emoji:'🐰',category:'bed',source:'Bing Deutsch – offizieller Kanal',episodes:[
    {id:'bing-ten',title:'Zehn ganze Folgen',youtubeId:'EDib6rG13_E'},
    {id:'bing-five',title:'Fünf ganze Folgen',youtubeId:'vPbYyG-7SJ4'},
    {id:'bing-new',title:'Neue ganze Folgen',youtubeId:'7Hh_fh0owqQ'}
  ]},
  {id:'lichterkinder',title:'Lichterkinder',emoji:'🎵',category:'stage',source:'Lichterkinder – offizieller Kanal',episodes:[
    {id:'licht-biene',title:'Guck mal diese Biene da',youtubeId:'I1Ns-nVULzA'},
    {id:'licht-dino',title:'Der kleine Dino',youtubeId:'jT5fCSki8pc'},
    {id:'licht-body',title:'Körperteil Blues',youtubeId:'iXFAunwnIxE'}
  ]}
];

function defaults(){
  return {
    version:VERSION,pin:'1234',
    kids:[{id:'ludwig',name:'Ludwig',avatar:'🧒',minutes:20},{id:'fabian',name:'Fabian',avatar:'👦',minutes:15}],
    collections:structuredClone(CURATED),
    favorites:{ludwig:[],fabian:[]},history:[],
    settings:{smartSort:true},createdAt:new Date().toISOString()
  };
}
function arr(v){return Array.isArray(v)?v:[]}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function slug(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'')}
function uid(p='id'){return p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7)}
function yt(v){v=String(v||'').trim();if(/^[\w-]{11}$/.test(v))return v;const m=v.match(/(?:youtu\.be\/|v=|embed\/|shorts\/)([\w-]{11})/);return m?m[1]:''}
function thumb(id){return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`}
function poster(emoji){return 'data:image/svg+xml,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d8f4ff"/><stop offset="1" stop-color="#fff1c7"/></linearGradient></defs><rect width="100%" height="100%" rx="35" fill="url(#g)"/><text x="50%" y="58%" text-anchor="middle" font-size="150">${emoji||'🐻'}</text></svg>`)}
function normalizeCategory(c){
  const x=String(c||'').toLowerCase();
  if(x.includes('musik')||x==='stage')return'stage';
  if(x.includes('nacht')||x==='bed')return'bed';
  if(x.includes('tier')||x.includes('wissen')||x==='tree')return'tree';
  return'garage';
}
function cleanEpisodes(list, used){
  const out=[];
  for(const e of arr(list)){
    const id=yt(e.youtubeId||e.url||e.link);
    if(!id||used.has(id))continue;
    used.add(id);
    out.push({id:String(e.id||uid('episode')),title:String(e.title||'Folge'),youtubeId:id});
  }
  return out;
}
function mergeCollections(raw){
  const usedVideos=new Set();
  const curated=structuredClone(CURATED).map(c=>({...c,active:true,audience:['all'],episodes:cleanEpisodes(c.episodes,usedVideos)}));
  const byTitle=new Map(curated.map(c=>[slug(c.title),c]));
  const knownEmpty=new Set(['puffinrock','bobderbaumeister','simon','bienemaja','leoderlastwagen','singmitmir']);
  for(const old of arr(raw)){
    const title=String(old?.title||'').trim();
    if(!title)continue;
    const key=slug(title);
    const incoming=cleanEpisodes(old.episodes,new Set()); // local cleanup first
    if(!incoming.length){
      if(knownEmpty.has(key)||byTitle.has(key))continue;
      continue; // No empty cards in the child area.
    }
    const target=byTitle.get(key);
    if(target){
      for(const e of incoming){
        if(!usedVideos.has(e.youtubeId)){usedVideos.add(e.youtubeId);target.episodes.push(e)}
      }
      continue;
    }
    const episodes=[];
    for(const e of incoming){
      if(!usedVideos.has(e.youtubeId)){usedVideos.add(e.youtubeId);episodes.push(e)}
    }
    if(!episodes.length)continue;
    const custom={
      id:String(old.id||uid('series')),title,
      emoji:String(old.emoji||'🎬'),category:normalizeCategory(old.category),
      source:String(old.source||'Eigener Eintrag'),active:old.active!==false,
      audience:arr(old.audience).length?arr(old.audience):['all'],episodes
    };
    byTitle.set(key,custom);curated.push(custom);
  }
  return curated.filter(c=>c.episodes.length>0);
}
function normalize(raw){
  const d=defaults(),s=raw&&typeof raw==='object'?raw:{};
  const kids=arr(s.kids).length?arr(s.kids):d.kids;
  const collections=mergeCollections(s.collections);
  const validIds=new Set(collections.flatMap(c=>c.episodes.map(e=>e.id)));
  const favorites={};
  for(const k of kids){
    favorites[String(k.id||'kid')]=[...new Set(arr(s.favorites?.[k.id]).filter(id=>validIds.has(id)))];
  }
  const history=arr(s.history).filter(h=>validIds.has(h.episodeId)).slice(-800);
  return {
    version:VERSION,
    pin:/^\d{4,8}$/.test(String(s.pin||''))?String(s.pin):'1234',
    kids:kids.map((k,i)=>({id:String(k.id||('kid-'+i)),name:String(k.name||'Kind'),avatar:String(k.avatar||'🧒'),minutes:Math.max(5,Math.min(180,Number(k.minutes)||15))})),
    collections,favorites,history,
    settings:{...d.settings,...(s.settings||{})},
    createdAt:s.createdAt||d.createdAt
  };
}
function load(){
  try{
    const own=localStorage.getItem(KEY);
    if(own)return normalize(JSON.parse(own));
    for(const key of LEGACY){
      const raw=localStorage.getItem(key);
      if(raw)return normalize(JSON.parse(raw));
    }
  }catch(e){console.error(e)}
  return defaults();
}
function save(){state.version=VERSION;localStorage.setItem(KEY,JSON.stringify(state))}
let state=load(),screen='profiles',kid=null,ticket=null,filter='all',seriesId=null,modal=null,adminTab='overview',playerTimer=null;
save();

const root=document.getElementById('root');
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),1800)}
function bearLogo(){return `<svg viewBox="0 0 120 120" aria-hidden="true"><circle cx="28" cy="28" r="19" fill="#915631"/><circle cx="92" cy="28" r="19" fill="#915631"/><circle cx="60" cy="62" r="47" fill="#bd7c48"/><ellipse cx="60" cy="72" rx="28" ry="24" fill="#f1c89c"/><circle cx="43" cy="55" r="5" fill="#243c48"/><circle cx="77" cy="55" r="5" fill="#243c48"/><ellipse cx="60" cy="69" rx="8" ry="6" fill="#372822"/><path d="M60 75c-7 9-16 7-19 3m19-3c7 9 16 7 19 3" fill="none" stroke="#372822" stroke-width="4" stroke-linecap="round"/><circle cx="39" cy="67" r="5" fill="#e78e8b"/><circle cx="81" cy="67" r="5" fill="#e78e8b"/></svg>`}
function shell(content,opts={}){
  return `<div class="app"><header class="topbar"><div class="brand">${bearLogo()}<div class="brandName">Bärflix</div></div><button class="iconBtn" data-action="parent" aria-label="Elternbereich">🔒</button></header><main class="main">${content}</main></div>`;
}
function visibleCollections(){
  if(!kid)return[];
  return state.collections.filter(c=>c.active&&c.episodes.length&&(c.audience.includes('all')||c.audience.includes(kid.id)));
}
function score(c){
  const ids=new Set(c.episodes.map(e=>e.id));let n=0;
  for(const h of state.history)if(h.kidId===kid?.id&&ids.has(h.episodeId))n+=3;
  for(const id of arr(state.favorites[kid?.id]))if(ids.has(id))n+=5;
  return n;
}
function sorted(cols){return state.settings.smartSort?[...cols].sort((a,b)=>score(b)-score(a)||a.title.localeCompare(b.title,'de')):cols}
function earned(){return Math.min(STICKERS.length,Math.floor(state.history.filter(h=>h.kidId===kid?.id).length/2))}
function profilesView(){
  return shell(`<div class="profileIntro"><div class="bigBear">🐻</div></div><div class="profiles">${state.kids.map(k=>`<button class="profile" data-kid="${esc(k.id)}" aria-label="${esc(k.name)}"><div class="avatar">${esc(k.avatar)}</div><div class="profileName">${esc(k.name)}</div></button>`).join('')}</div>`);
}
function ticketsView(){
  return shell(`<button class="backBtn" data-action="backProfiles" aria-label="Zurück">←</button><section class="glass ticketWrap"><div class="ticketHeader">${esc(kid.avatar)} 🎟️</div><div class="tickets"><button class="ticket short" data-ticket="short" aria-label="Kleines Ticket">🐣</button><button class="ticket normal" data-ticket="normal" aria-label="Normales Ticket">🎟️</button><button class="ticket bonus" data-ticket="bonus" aria-label="Bonus-Ticket">⭐</button></div></section>`);
}
function seriesCard(c){
  const cover=c.episodes[0]?.youtubeId;
  return `<button class="series" data-series="${esc(c.id)}" aria-label="${esc(c.title)}"><img src="${cover?thumb(cover):poster(c.emoji)}" onerror="this.onerror=null;this.src='${poster(c.emoji)}'" alt=""><span class="seriesTitle">${esc(c.title)}</span></button>`;
}
function libraryView(){
  if(!kid){screen='profiles';return profilesView()}
  if(ticket&&Date.now()>=ticket.expiresAt){ticket=null;screen='tickets';return ticketsView()}
  let cols=visibleCollections();
  if(filter!=='all')cols=cols.filter(c=>c.category===filter);
  cols=sorted(cols);
  return shell(`<div class="kidBar"><button class="backBtn" data-action="backProfiles" aria-label="Profile">←</button><div class="kidBubble">${esc(kid.avatar)}</div><button class="iconBtn" data-action="stickers" aria-label="Stickerbuch">⭐</button><div class="bearBubble">🐻</div></div>
  <div class="filters">
    ${[['all','🏠','Alle'],['garage','🚗','Fahrzeuge'],['tree','🐾','Entdecken'],['stage','🎵','Musik'],['bed','🌙','Ruhig']].map(([id,icon,label])=>`<button class="filter ${filter===id?'active':''}" data-filter="${id}" aria-label="${label}">${icon}</button>`).join('')}
  </div>
  <div class="seriesGrid">${cols.map(seriesCard).join('')}</div>`);
}
function collectionView(){
  const c=state.collections.find(x=>x.id===seriesId);
  if(!c||!c.episodes.length){screen='library';return libraryView()}
  return shell(`<div class="kidBar"><button class="backBtn" data-action="backLibrary" aria-label="Zurück">←</button><div class="kidBubble">${esc(c.emoji||'🎬')}</div><div class="bearBubble">🐻</div></div>
  <div class="episodeGrid">${c.episodes.map(e=>`<div class="episode"><button class="episode" data-play="${esc(e.id)}" data-c="${esc(c.id)}" aria-label="${esc(e.title)}"><img src="${thumb(e.youtubeId)}" onerror="this.onerror=null;this.src='${poster(c.emoji)}'" alt=""><span class="playCircle">▶</span></button><button class="favBtn" data-fav="${esc(e.id)}" aria-label="Favorit">${arr(state.favorites[kid.id]).includes(e.id)?'❤️':'🤍'}</button></div>`).join('')}</div>`);
}
function parentModal(){
  return `<div class="overlay"><div class="modal"><div class="modalHead"><h2>Elternbereich</h2><span class="spacer"></span><button class="btn" data-action="closeModal">✕</button></div><div class="form"><div class="field"><label>PIN</label><input id="pinInput" inputmode="numeric" type="password" maxlength="8" autocomplete="off"></div><button class="btn primary full" data-action="unlock">Öffnen</button><div class="small">Notfall-PIN: 1234</div></div></div></div>`;
}
function stickerModal(){
  return `<div class="overlay"><div class="modal"><div class="modalHead"><h2>${esc(kid?.name||'Kind')}s Sticker</h2><span class="spacer"></span><button class="btn" data-action="closeModal">✕</button></div><div class="stickerGrid">${STICKERS.map((s,i)=>`<div class="sticker ${i<earned()?'on':''}">${i<earned()?s:'🔒'}</div>`).join('')}</div></div></div>`;
}
function adminView(){
  return shell(`<div class="glass" style="padding:20px"><div class="modalHead"><h2>Elternbereich</h2><span class="spacer"></span><button class="btn" data-action="exitAdmin">Fertig</button></div><div class="tabs">${[['overview','Übersicht'],['kids','Kinder'],['series','Serien'],['settings','Einstellungen'],['backup','Backup']].map(([id,label])=>`<button class="btn tab ${adminTab===id?'active':''}" data-tab="${id}">${label}</button>`).join('')}</div>${adminContent()}</div>`);
}
function adminContent(){
  if(adminTab==='overview'){
    return `<div class="adminGrid"><div class="stat"><b>${state.collections.length}</b>Serien</div><div class="stat"><b>${state.collections.reduce((n,c)=>n+c.episodes.length,0)}</b>Videos</div><div class="stat"><b>${state.history.length}</b>Starts</div></div><p class="small">Im Kinderbereich erscheinen ausschließlich Serien mit mindestens einem Video. Doppelte Videos werden automatisch entfernt.</p>`;
  }
  if(adminTab==='kids'){
    return `<div class="adminList">${state.kids.map(k=>`<div class="adminItem"><div style="font-size:40px">${esc(k.avatar)}</div><div class="spacer"><b>${esc(k.name)}</b><div class="small">${k.minutes} Minuten beim normalen Ticket</div></div><button class="btn" data-edit-kid="${esc(k.id)}">Bearbeiten</button></div>`).join('')}</div>`;
  }
  if(adminTab==='series'){
    return `<button class="btn primary" data-action="addSeries">Serie hinzufügen</button><div class="adminList" style="margin-top:12px">${state.collections.map(c=>`<div class="adminItem"><img class="adminThumb" src="${thumb(c.episodes[0].youtubeId)}" onerror="this.onerror=null;this.src='${poster(c.emoji)}'" alt=""><div class="spacer"><b>${esc(c.title)}</b><div class="small">${c.episodes.length} Videos · ${esc(c.source||'Quelle unbekannt')}</div></div><button class="btn" data-edit-series="${esc(c.id)}">Bearbeiten</button></div>`).join('')}</div>`;
  }
  if(adminTab==='settings'){
    return `<div class="form"><div class="field"><label>Neue Eltern-PIN</label><input id="newPin" type="password" inputmode="numeric" maxlength="8" value="${esc(state.pin)}"></div><label class="switch"><span><b>Lieblingsserien automatisch nach vorn</b><br><span class="small">Die Auswertung bleibt nur auf diesem Gerät.</span></span><input id="smartSort" type="checkbox" ${state.settings.smartSort?'checked':''}></label><button class="btn primary" data-action="saveSettings">Speichern</button><button class="btn danger" data-action="resetApp">Alles zurücksetzen</button></div>`;
  }
  return `<div class="form"><button class="btn primary" data-action="export">Backup herunterladen</button><div class="field"><label>Backup importieren</label><input id="importFile" type="file" accept="application/json"></div><button class="btn" data-action="import">Importieren</button></div>`;
}
function editSeriesModal(id){
  const c=id?state.collections.find(x=>x.id===id):{id:'',title:'',emoji:'🎬',category:'garage',source:'Eigener Eintrag',episodes:[]};
  return `<div class="overlay"><div class="modal"><div class="modalHead"><h2>${id?'Serie bearbeiten':'Serie hinzufügen'}</h2><span class="spacer"></span><button class="btn" data-action="closeModal">✕</button></div><div class="form"><input type="hidden" id="seriesId" value="${esc(c.id)}"><div class="field"><label>Titel</label><input id="seriesTitle" value="${esc(c.title)}"></div><div class="field"><label>Symbol</label><input id="seriesEmoji" value="${esc(c.emoji||'🎬')}"></div><div class="field"><label>Bereich</label><select id="seriesCategory">${[['garage','Fahrzeuge'],['tree','Entdecken'],['stage','Musik'],['bed','Ruhig']].map(([v,l])=>`<option value="${v}" ${c.category===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="field"><label>Quelle</label><input id="seriesSource" value="${esc(c.source||'')}"></div><div class="field"><label>Neuer YouTube-Link</label><input id="episodeUrl" placeholder="https://youtu.be/..."></div><div class="field"><label>Videotitel</label><input id="episodeTitle"></div><button class="btn primary" data-action="saveSeries">Speichern</button>${id?`<div class="adminList">${c.episodes.map(e=>`<div class="adminItem"><img class="adminThumb" src="${thumb(e.youtubeId)}" alt=""><div class="spacer"><b>${esc(e.title)}</b><div class="small">${esc(e.youtubeId)}</div></div><button class="btn danger" data-delete-episode="${esc(e.id)}" data-parent="${esc(c.id)}">Löschen</button></div>`).join('')}</div><button class="btn danger" data-delete-series="${esc(c.id)}">Serie löschen</button>`:''}</div></div></div>`;
}
function editKidModal(id){
  const k=state.kids.find(x=>x.id===id);
  return `<div class="overlay"><div class="modal"><div class="modalHead"><h2>Profil bearbeiten</h2><span class="spacer"></span><button class="btn" data-action="closeModal">✕</button></div><div class="form"><input type="hidden" id="kidId" value="${esc(k.id)}"><div class="field"><label>Name</label><input id="kidName" value="${esc(k.name)}"></div><div class="field"><label>Symbol</label><input id="kidAvatar" value="${esc(k.avatar)}"></div><div class="field"><label>Normales Ticket (Minuten)</label><input id="kidMinutes" type="number" min="5" max="180" value="${k.minutes}"></div><button class="btn primary" data-action="saveKid">Speichern</button></div></div></div>`;
}
function render(){
  let html=screen==='profiles'?profilesView():screen==='tickets'?ticketsView():screen==='library'?libraryView():screen==='collection'?collectionView():screen==='admin'?adminView():profilesView();
  if(modal==='parent')html+=parentModal();
  if(modal==='stickers')html+=stickerModal();
  if(typeof modal==='string'&&modal.startsWith('series:'))html+=editSeriesModal(modal.slice(7));
  if(typeof modal==='string'&&modal.startsWith('kid:'))html+=editKidModal(modal.slice(4));
  root.innerHTML=html;bind();
}
function bind(){
  document.querySelectorAll('[data-kid]').forEach(b=>b.onclick=()=>{kid=state.kids.find(k=>k.id===b.dataset.kid);ticket=null;screen=kid?'tickets':'profiles';render()});
  document.querySelectorAll('[data-ticket]').forEach(b=>b.onclick=()=>chooseTicket(b.dataset.ticket));
  document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render()});
  document.querySelectorAll('[data-series]').forEach(b=>b.onclick=()=>{seriesId=b.dataset.series;screen='collection';render()});
  document.querySelectorAll('[data-play]').forEach(b=>b.onclick=()=>playEpisode(b.dataset.c,b.dataset.play));
  document.querySelectorAll('[data-fav]').forEach(b=>b.onclick=e=>{e.stopPropagation();toggleFav(b.dataset.fav)});
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{adminTab=b.dataset.tab;render()});
  document.querySelectorAll('[data-edit-series]').forEach(b=>b.onclick=()=>{modal='series:'+b.dataset.editSeries;render()});
  document.querySelectorAll('[data-edit-kid]').forEach(b=>b.onclick=()=>{modal='kid:'+b.dataset.editKid;render()});
  document.querySelectorAll('[data-delete-series]').forEach(b=>b.onclick=()=>deleteSeries(b.dataset.deleteSeries));
  document.querySelectorAll('[data-delete-episode]').forEach(b=>b.onclick=()=>deleteEpisode(b.dataset.parent,b.dataset.deleteEpisode));
  document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>action(b.dataset.action));
}
function chooseTicket(type){
  if(!kid){screen='profiles';return render()}
  const base=Math.max(5,Number(kid.minutes)||15);
  const minutes=type==='short'?Math.max(5,Math.round(base/2)):type==='bonus'?base+10:base;
  ticket={type,minutes,expiresAt:Date.now()+minutes*60000};
  filter='all';screen='library';render();
}
function action(a){
  if(a==='parent'){modal='parent';return render()}
  if(a==='closeModal'){modal=null;return render()}
  if(a==='unlock'){
    const pin=document.getElementById('pinInput')?.value||'';
    if(pin===state.pin||pin==='1234'){modal=null;screen='admin';adminTab='overview';render()}
    else toast('PIN stimmt nicht');
  }
  if(a==='backProfiles'){kid=null;ticket=null;screen='profiles';render()}
  if(a==='backLibrary'){screen='library';render()}
  if(a==='exitAdmin'){screen=kid&&ticket?'library':'profiles';render()}
  if(a==='stickers'){modal='stickers';render()}
  if(a==='addSeries'){modal='series:';render()}
  if(a==='saveSeries')saveSeriesForm()
  if(a==='saveKid')saveKidForm()
  if(a==='saveSettings')saveSettings()
  if(a==='resetApp')resetApp()
  if(a==='export')exportBackup()
  if(a==='import')importBackup()
}
function toggleFav(id){
  if(!kid)return;
  const list=arr(state.favorites[kid.id]);
  state.favorites[kid.id]=list.includes(id)?list.filter(x=>x!==id):[...list,id];
  save();render();
}
function playEpisode(cid,eid){
  const c=state.collections.find(x=>x.id===cid),e=c?.episodes.find(x=>x.id===eid);
  if(!e||!kid)return toast('🐻');
  if(ticket&&Date.now()>=ticket.expiresAt){ticket=null;screen='tickets';render();return}
  state.history.push({kidId:kid.id,collectionId:cid,episodeId:eid,at:new Date().toISOString()});
  state.history=state.history.slice(-800);save();
  const p=document.createElement('div');p.className='player';
  p.innerHTML=`<div class="playerTop"><button class="backBtn" id="closePlayer" aria-label="Zurück">←</button></div><iframe allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen src="https://www.youtube-nocookie.com/embed/${e.youtubeId}?autoplay=1&rel=0&modestbranding=1&playsinline=1"></iframe>`;
  document.body.appendChild(p);
  const close=()=>{clearInterval(playerTimer);p.remove()};
  p.querySelector('#closePlayer').onclick=close;
  clearInterval(playerTimer);
  playerTimer=setInterval(()=>{
    if(ticket&&Date.now()>=ticket.expiresAt){
      clearInterval(playerTimer);p.innerHTML='<div class="playerDone">🐻💤</div>';
      setTimeout(()=>{p.remove();ticket=null;screen='tickets';render()},1700);
    }
  },1000);
}
function saveSeriesForm(){
  const id=document.getElementById('seriesId').value;
  const title=document.getElementById('seriesTitle').value.trim();
  const emoji=document.getElementById('seriesEmoji').value.trim()||'🎬';
  const category=document.getElementById('seriesCategory').value;
  const source=document.getElementById('seriesSource').value.trim()||'Eigener Eintrag';
  const url=document.getElementById('episodeUrl').value.trim();
  const epTitle=document.getElementById('episodeTitle').value.trim();
  if(!title)return toast('Titel fehlt');
  let c=id?state.collections.find(x=>x.id===id):null;
  if(!c){c={id:uid('series'),title,emoji,category,source,active:true,audience:['all'],episodes:[]};state.collections.push(c)}
  c.title=title;c.emoji=emoji;c.category=category;c.source=source;
  if(url){
    const video=yt(url);if(!video)return toast('Link nicht erkannt');
    const duplicate=state.collections.some(x=>x.episodes.some(e=>e.youtubeId===video));
    if(duplicate)return toast('Video ist schon vorhanden');
    c.episodes.push({id:uid('episode'),title:epTitle||'Video',youtubeId:video});
  }
  if(!c.episodes.length){state.collections=state.collections.filter(x=>x.id!==c.id);modal=null;save();render();return toast('Leere Serie entfernt')}
  state=normalize(state);save();modal=null;render();toast('Gespeichert');
}
function saveKidForm(){
  const k=state.kids.find(x=>x.id===document.getElementById('kidId').value);if(!k)return;
  k.name=document.getElementById('kidName').value.trim()||k.name;
  k.avatar=document.getElementById('kidAvatar').value.trim()||k.avatar;
  k.minutes=Math.max(5,Math.min(180,Number(document.getElementById('kidMinutes').value)||15));
  save();modal=null;render();toast('Gespeichert');
}
function saveSettings(){
  const pin=document.getElementById('newPin').value.trim();
  if(!/^\d{4,8}$/.test(pin))return toast('PIN: 4–8 Ziffern');
  state.pin=pin;state.settings.smartSort=document.getElementById('smartSort').checked;save();toast('Gespeichert');
}
function deleteSeries(id){
  if(!confirm('Serie löschen?'))return;
  state.collections=state.collections.filter(c=>c.id!==id);state=normalize(state);save();modal=null;render();
}
function deleteEpisode(cid,eid){
  const c=state.collections.find(x=>x.id===cid);if(!c)return;
  c.episodes=c.episodes.filter(e=>e.id!==eid);
  if(!c.episodes.length){state.collections=state.collections.filter(x=>x.id!==cid);modal=null}
  else modal='series:'+cid;
  state=normalize(state);save();render();
}
function resetApp(){
  if(!confirm('Bärflix wirklich zurücksetzen?'))return;
  state=defaults();save();kid=null;ticket=null;filter='all';modal=null;screen='profiles';render();
}
function exportBackup(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Baerflix-Backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),600);
}
function importBackup(){
  const file=document.getElementById('importFile')?.files?.[0];if(!file)return toast('Datei auswählen');
  const reader=new FileReader();
  reader.onload=()=>{try{state=normalize(JSON.parse(reader.result));save();toast('Importiert');render()}catch(e){toast('Datei fehlerhaft')}};
  reader.readAsText(file);
}
window.addEventListener('error',e=>{console.error(e.error||e.message);toast('🐻')});
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js?v=91').catch(console.warn));
render();
</script>
</body>
</html>
