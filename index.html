<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#62c4ed">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
<title>Bärflix 9.0</title>
<style>
:root{--sky:#75d2f3;--ink:#24455a;--soft:#607a89;--card:rgba(255,255,255,.94);--yellow:#ffd85c;--pink:#ff9eb6;--green:#91d78a;--purple:#aa9cf0;--shadow:0 16px 40px rgba(32,83,107,.18);font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:linear-gradient(#73cff2,#eaf9ff 65%,#a5dc8c);color:var(--ink)}body{min-height:100vh;overflow-x:hidden}button,input,select,textarea{font:inherit}.hidden{display:none!important}
.world{position:fixed;inset:0;pointer-events:none;overflow:hidden}.sun{position:absolute;right:7%;top:6%;width:92px;height:92px;border-radius:50%;background:#ffe36d;box-shadow:0 0 45px #fff19a}.cloud{position:absolute;width:130px;height:44px;border-radius:999px;background:#fff;opacity:.88;animation:drift 24s linear infinite}.cloud:before,.cloud:after{content:"";position:absolute;background:#fff;border-radius:50%}.cloud:before{width:58px;height:58px;left:20px;top:-26px}.cloud:after{width:75px;height:75px;right:12px;top:-40px}.c1{top:13%;left:-160px}.c2{top:28%;left:-230px;animation-delay:-11s;transform:scale(.7)}@keyframes drift{to{transform:translateX(calc(100vw + 360px))}}
.app{position:relative;z-index:1;max-width:1180px;margin:auto;min-height:100vh;padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom)}.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0}.brand{display:flex;align-items:center;gap:12px}.brand svg{width:58px;height:58px;filter:drop-shadow(0 7px 7px rgba(31,79,98,.2))}.brand h1{margin:0;font-size:36px;letter-spacing:-1.5px}.btn{border:0;border-radius:18px;padding:12px 16px;background:white;color:var(--ink);font-weight:900;box-shadow:0 8px 20px rgba(36,69,90,.15)}.btn:active,.tile:active,.profile:active,.series:active{transform:scale(.96)}.btn.primary{background:var(--yellow)}.btn.danger{background:#ffd8df}.btn.full{width:100%}.iconBtn{width:52px;height:52px;padding:0;font-size:24px}
.panel{background:var(--card);border:4px solid rgba(255,255,255,.7);border-radius:34px;box-shadow:var(--shadow);padding:24px}.center{text-align:center}.hero h2{font-size:42px;margin:4px 0 7px}.hero p{font-size:19px;color:var(--soft);font-weight:750;margin:0}.profiles{display:grid;grid-template-columns:repeat(2,minmax(0,250px));gap:24px;justify-content:center;margin:34px 0}.profile{border:0;border-radius:36px;min-height:235px;padding:23px;background:linear-gradient(145deg,#fff,#eaf8ff);box-shadow:var(--shadow);color:var(--ink)}.avatar{font-size:92px}.profile h3{font-size:29px;margin:10px 0 0}.small{font-size:13px;color:var(--soft)}
.tickets{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:25px}.ticket{border:0;min-height:190px;border-radius:30px;padding:20px;color:var(--ink);font-weight:950;box-shadow:var(--shadow);position:relative;overflow:hidden}.ticket:after{content:"";position:absolute;inset:auto -15% -55% -15%;height:75%;border-radius:50%;background:rgba(255,255,255,.4)}.ticket .emoji{font-size:64px;display:block}.ticket h3{font-size:25px;margin:12px 0 4px}.ticket.yellow{background:linear-gradient(145deg,#ffe886,#ffc65d)}.ticket.pink{background:linear-gradient(145deg,#ffc1d2,#ff8eaa)}.ticket.blue{background:linear-gradient(145deg,#b8ecff,#6fc7ec)}
.welcome{display:grid;grid-template-columns:1fr auto;align-items:center;gap:15px}.welcome h2{font-size:38px;margin:0 0 6px}.mascot{font-size:86px;animation:bob 3s ease-in-out infinite}@keyframes bob{50%{transform:translateY(-8px) rotate(3deg)}}.status{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px}.pill{background:white;border-radius:999px;padding:9px 13px;font-weight:900;box-shadow:0 6px 16px rgba(36,69,90,.12)}
.map{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:20px 0}.tile{border:4px solid rgba(255,255,255,.8);border-radius:30px;min-height:132px;padding:14px;background:white;color:var(--ink);box-shadow:var(--shadow);font-weight:950}.tile span{font-size:50px;display:block}.tile.garage{background:linear-gradient(145deg,#ffd577,#ff9d7b)}.tile.tree{background:linear-gradient(145deg,#b8eba0,#6fc484)}.tile.stage{background:linear-gradient(145deg,#ffc6dc,#b8a7ff)}.tile.bed{background:linear-gradient(145deg,#bdd4ff,#9699df)}.tile.cinema{background:linear-gradient(145deg,#c5efff,#70c4e6)}.tile.active{outline:6px solid rgba(255,216,92,.7)}
.sectionTitle{font-size:27px;margin:24px 0 12px}.seriesGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.series{position:relative;border:0;border-radius:26px;overflow:hidden;background:white;box-shadow:var(--shadow);padding:0;color:var(--ink);text-align:left}.series img{width:100%;aspect-ratio:16/10;object-fit:cover;background:#dfeef4}.series .meta{padding:14px}.series h3{font-size:21px;margin:0}.badge{position:absolute;left:9px;top:9px;background:#ffeb75;border:3px solid white;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:1000}.empty{padding:40px;text-align:center;font-size:62px}.episodeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.episode{background:white;border-radius:24px;overflow:hidden;box-shadow:var(--shadow)}.episode img{width:100%;aspect-ratio:16/9;object-fit:cover}.episode .meta{padding:13px}.episode h4{font-size:18px;margin:0 0 10px}.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.spacer{flex:1}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(15,40,54,.56);backdrop-filter:blur(8px);display:grid;place-items:center;padding:20px}.modal{width:min(760px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:30px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.28)}.modalHead{display:flex;align-items:center;gap:12px}.modal h2{margin:0;font-size:30px}.form{display:grid;gap:13px;margin-top:18px}.field{display:grid;gap:6px}.field label{font-weight:900}.field input,.field select,.field textarea{width:100%;border:2px solid #dbe7ed;border-radius:15px;padding:12px;background:#fbfdfe}.tabs{display:flex;gap:8px;overflow:auto;margin:16px 0}.tab{white-space:nowrap}.tab.active{background:var(--yellow)}.adminList{display:grid;gap:10px}.adminItem{display:flex;gap:10px;align-items:center;padding:12px;background:#f3f8fa;border-radius:17px}.adminItem b{display:block}.switch{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:12px;background:#f3f8fa;border-radius:16px}.toast{position:fixed;left:50%;bottom:30px;transform:translate(-50%,20px);background:#24455a;color:white;padding:12px 17px;border-radius:999px;font-weight:900;opacity:0;pointer-events:none;transition:.2s;z-index:300}.toast.show{opacity:1;transform:translate(-50%,0)}
.player{position:fixed;inset:0;background:#10232e;z-index:200;display:grid;grid-template-rows:auto 1fr}.playerTop{display:flex;align-items:center;gap:10px;padding:12px;color:white}.player iframe{width:100%;height:100%;border:0}.stickerGrid{display:grid;grid-template-columns:repeat(6,1fr);gap:13px;margin-top:18px}.sticker{aspect-ratio:1;border-radius:22px;background:#eef4f7;border:3px dashed #bed0d9;display:grid;place-items:center;font-size:43px}.sticker.on{background:linear-gradient(145deg,#fff2a4,#ffd1dc);border-style:solid;border-color:white}
.errorBox{background:#fff0f2;border:2px solid #ffc2cc;border-radius:18px;padding:14px;color:#7f2c3a;margin:12px 0}
@media(max-width:850px){.seriesGrid{grid-template-columns:repeat(3,1fr)}.map{grid-template-columns:repeat(3,1fr)}.episodeGrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.app{padding-left:12px;padding-right:12px}.brand h1{font-size:29px}.brand svg{width:48px;height:48px}.profiles{grid-template-columns:1fr 1fr;gap:12px}.profile{min-height:190px;padding:15px}.avatar{font-size:70px}.tickets{grid-template-columns:1fr}.map{grid-template-columns:1fr 1fr}.tile{min-height:108px}.tile span{font-size:42px}.seriesGrid,.episodeGrid{grid-template-columns:1fr 1fr}.welcome h2{font-size:29px}.mascot{font-size:60px}.panel{padding:17px;border-radius:27px}.stickerGrid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="world"><div class="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div></div>
<div id="root"></div><div id="toast" class="toast"></div>
<script>
'use strict';
const VERSION='9.0.0';
const KEY='baerflix.v9';
const LEGACY=['baerflix.complete.v8','baerflix.complete.v7','baerflix.complete.v6'];
const STICKERS=['🌟','🚗','🚒','🐱','🦋','🚀','🦖','🏰','🎵','🌙','🍿','🧸'];
const STARTER=[
{id:'blaze',title:'Blaze',category:'Fahrzeuge',active:true,audience:['all'],episodes:[{id:'blaze-1',title:'Blaze – Abenteuer',youtubeId:'lbSyfB_eyNU'}]},
{id:'hotwheels',title:"Hot Wheels Let's Race",category:'Fahrzeuge',active:true,audience:['all'],episodes:[{id:'hot-1',title:'Hot Wheels',youtubeId:'ttxEpUDI1SU'}]},
{id:'fixies',title:'Die Fixies',category:'Wissen & Technik',active:true,audience:['all'],episodes:[{id:'fix-1',title:'Die Fixies',youtubeId:'Zolg8p50i18'}]},
{id:'tautropfen',title:'Die Tautropfentagebücher',category:'Tiere',active:true,audience:['all'],episodes:[{id:'tau-1',title:'Tautropfentagebücher',youtubeId:'37dWI78L4Ew'}]},
{id:'puffin',title:'Puffin Rock',category:'Tiere',active:true,audience:['all'],episodes:[]},
{id:'sam',title:'Feuerwehrmann Sam',category:'Fahrzeuge',active:true,audience:['all'],episodes:[]},
{id:'thomas',title:'Thomas & seine Freunde',category:'Fahrzeuge',active:true,audience:['all'],episodes:[]},
{id:'bob',title:'Bob der Baumeister',category:'Fahrzeuge',active:true,audience:['all'],episodes:[]},
{id:'bing',title:'Bing',category:'Gute Nacht',active:true,audience:['all'],episodes:[]},
{id:'simon',title:'Simon',category:'Gute Nacht',active:true,audience:['all'],episodes:[]},
{id:'maja',title:'Biene Maja',category:'Tiere',active:true,audience:['all'],episodes:[]},
{id:'leo',title:'Leo der Lastwagen',category:'Fahrzeuge',active:true,audience:['all'],episodes:[]},
{id:'lichterkinder',title:'Lichterkinder',category:'Musik',active:true,audience:['all'],episodes:[]},
{id:'singmitmir',title:'Sing mit mir',category:'Musik',active:true,audience:['all'],episodes:[]}
];
function defaults(){return {version:VERSION,pin:'1234',kids:[{id:'ludwig',name:'Ludwig',avatar:'🧒',minutes:20},{id:'fabian',name:'Fabian',avatar:'👦',minutes:15}],collections:structuredClone(STARTER),favorites:{ludwig:[],fabian:[]},history:[],settings:{smartSort:true,celebrations:true,largeText:false},createdAt:new Date().toISOString()}}
function safeArray(v){return Array.isArray(v)?v:[]}
function normalize(raw){const d=defaults(),s=raw&&typeof raw==='object'?raw:{};const kids=safeArray(s.kids).length?safeArray(s.kids):d.kids;const collections=safeArray(s.collections).length?safeArray(s.collections):d.collections;return {version:VERSION,pin:/^\d{4,8}$/.test(String(s.pin||''))?String(s.pin):'1234',kids:kids.map((k,i)=>({id:String(k.id||('kid-'+i)),name:String(k.name||'Kind'),avatar:String(k.avatar||'🧒'),minutes:Math.max(5,Number(k.minutes)||15)})),collections:collections.map((c,i)=>({id:String(c.id||('c-'+i)),title:String(c.title||'Serie'),category:String(c.category||'Kino'),active:c.active!==false,audience:safeArray(c.audience).length?safeArray(c.audience):['all'],episodes:safeArray(c.episodes).map((e,j)=>({id:String(e.id||('e-'+i+'-'+j)),title:String(e.title||'Folge'),youtubeId:extractYouTubeId(e.youtubeId||e.url||'')})).filter(e=>e.youtubeId)})),favorites:s.favorites&&typeof s.favorites==='object'?s.favorites:{},history:safeArray(s.history),settings:{...d.settings,...(s.settings||{})},createdAt:s.createdAt||d.createdAt}}
function migrateLegacy(){for(const k of LEGACY){try{const v=localStorage.getItem(k);if(v)return normalize(JSON.parse(v))}catch(e){console.warn(e)}}return defaults()}
function load(){try{const raw=localStorage.getItem(KEY);return raw?normalize(JSON.parse(raw)):migrateLegacy()}catch(e){console.error(e);return defaults()}}
function save(){state.version=VERSION;localStorage.setItem(KEY,JSON.stringify(state))}
let state=load(),screen='profiles',kid=null,ticket=null,place='all',collectionId=null,modal=null,adminTab='overview';
const root=document.getElementById('root');
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function uid(p='id'){return p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7)}
function extractYouTubeId(v){v=String(v||'').trim();if(/^[\w-]{11}$/.test(v))return v;const m=v.match(/(?:youtu\.be\/|v=|embed\/|shorts\/)([\w-]{11})/);return m?m[1]:''}
function thumb(id){return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove('show'),2200)}
function visibleCollections(){if(!kid)return[];return state.collections.filter(c=>c.active&&(c.audience.includes('all')||c.audience.includes(kid.id)))}
function categoryPlace(cat){if(cat==='Fahrzeuge')return'garage';if(cat==='Musik')return'stage';if(cat==='Gute Nacht')return'bed';if(cat==='Tiere'||cat==='Wissen & Technik')return'tree';return'cinema'}
function score(c){const ids=new Set(c.episodes.map(e=>e.id));let n=0;state.history.forEach(h=>{if(h.kidId===kid?.id&&ids.has(h.episodeId))n+=3});safeArray(state.favorites[kid?.id]).forEach(id=>{if(ids.has(id))n+=5});return n}
function sorted(cols){return state.settings.smartSort?[...cols].sort((a,b)=>score(b)-score(a)||a.title.localeCompare(b.title,'de')):cols}
function earned(){return Math.min(STICKERS.length,Math.floor(state.history.filter(h=>h.kidId===kid?.id).length/2))}
function shell(content){return `<div class="app"><header class="topbar"><div class="brand"><svg viewBox="0 0 120 120" aria-hidden="true"><circle cx="28" cy="28" r="19" fill="#9d6038"/><circle cx="92" cy="28" r="19" fill="#9d6038"/><circle cx="60" cy="62" r="47" fill="#bd7d48"/><ellipse cx="60" cy="72" rx="28" ry="24" fill="#f2cba0"/><circle cx="43" cy="55" r="5"/><circle cx="77" cy="55" r="5"/><ellipse cx="60" cy="69" rx="8" ry="6" fill="#3c2b25"/><path d="M60 75c-7 9-16 7-19 3m19-3c7 9 16 7 19 3" fill="none" stroke="#3c2b25" stroke-width="4" stroke-linecap="round"/></svg><h1>Bärflix</h1></div>${screen!=='setup'?'<button class="btn iconBtn" data-action="parent">🔒</button>':''}</header><main>${content}</main></div>`}
function profilesView(){return shell(`<section class="panel center hero"><h2>Wer schaut heute?</h2><p>Ludwig und Fabian stehen im Mittelpunkt.</p><div class="profiles">${state.kids.map(k=>`<button class="profile" data-kid="${esc(k.id)}"><div class="avatar">${esc(k.avatar)}</div><h3>${esc(k.name)}</h3></button>`).join('')}</div></section>`)}
function ticketsView(){return shell(`<button class="btn" data-action="backProfiles">← Zurück</button><section class="panel center hero" style="margin-top:15px"><h2>${esc(kid.name)}, such dir ein Ticket aus</h2><p>Die Zeit wird nur im Hintergrund verwaltet.</p><div class="tickets"><button class="ticket yellow" data-ticket="short"><span class="emoji">🎟️</span><h3>Kleines Ticket</h3><span>Eine kurze Runde</span></button><button class="ticket pink" data-ticket="normal"><span class="emoji">🎫</span><h3>Abenteuer-Ticket</h3><span>Dein normales Ticket</span></button><button class="ticket blue" data-ticket="bonus"><span class="emoji">⭐</span><h3>Bonus-Ticket</h3><span>Eine extra lange Runde</span></button></div></section>`)}
function seriesCard(c){const cover=c.episodes[0]?.youtubeId;return `<button class="series" data-series="${c.id}">${score(c)===0?'<span class="badge">NEU</span>':''}<img src="${cover?thumb(cover):'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400"><rect width="100%" height="100%" fill="#dff3fb"/><text x="50%" y="52%" text-anchor="middle" font-size="85">🐻</text></svg>')}" alt=""><div class="meta"><h3>${esc(c.title)}</h3><div class="small">${c.episodes.length?c.episodes.length+' Folge(n)':'Im Elternbereich ergänzen'}</div></div></button>`}
function libraryView(){let cols=visibleCollections();if(place!=='all')cols=cols.filter(c=>categoryPlace(c.category)===place);cols=sorted(cols);return shell(`<section class="panel welcome"><div><h2>Hallo ${esc(kid.name)}!</h2><p>Wohin möchtest du heute reisen?</p><div class="status"><span class="pill">⭐ ${earned()} Sticker</span><span class="pill">🎬 ${state.history.filter(h=>h.kidId===kid.id).length} Abenteuer</span></div></div><div class="mascot">🐻🎈</div></section><div class="map">${[['garage','🚗','Garage','garage'],['tree','🌳','Baumhaus','tree'],['stage','🎵','Bühne','stage'],['bed','🌙','Traumzimmer','bed'],['cinema','🎬','Kino','cinema']].map(([id,e,l,cl])=>`<button class="tile ${cl} ${place===id?'active':''}" data-place="${id}"><span>${e}</span>${l}</button>`).join('')}<button class="tile ${place==='all'?'active':''}" data-place="all"><span>🏠</span>Alle Welten</button></div><h2 class="sectionTitle">${place==='all'?'Für '+esc(kid.name):'Deine Auswahl'}</h2><div class="seriesGrid">${cols.length?cols.map(seriesCard).join(''):'<div class="empty">🐻</div>'}</div>`)}
function collectionView(){const c=state.collections.find(x=>x.id===collectionId);if(!c){screen='library';return libraryView()}return shell(`<button class="btn" data-action="backLibrary">← Zurück</button><section class="panel" style="margin-top:15px"><h2>${esc(c.title)}</h2><p class="small">${esc(c.category)}</p>${c.episodes.length?`<div class="episodeGrid">${c.episodes.map(e=>`<article class="episode"><img src="${thumb(e.youtubeId)}" alt=""><div class="meta"><h4>${esc(e.title)}</h4><div class="row"><button class="btn primary" data-play="${e.id}" data-c="${c.id}">▶ Abspielen</button><button class="btn" data-fav="${e.id}">${safeArray(state.favorites[kid.id]).includes(e.id)?'❤️':'🤍'}</button></div></div></article>`).join('')}</div>`:'<div class="empty"><div>🐻</div><p class="small">Hier sind noch keine Folgen hinterlegt.</p></div>'}</section>`)}
function parentModal(){return `<div class="overlay"><div class="modal"><div class="modalHead"><h2>Elternbereich</h2><span class="spacer"></span><button class="btn" data-action="closeModal">✕</button></div><div class="form"><div class="field"><label>PIN</label><input id="pinInput" inputmode="numeric" maxlength="8" placeholder="PIN eingeben"></div><button class="btn primary full" data-action="unlock">Öffnen</button><div class="small center">Standard-PIN bei einer frischen Installation: 1234</div></div></div></div>`}
function adminView(){return shell(`<section class="panel"><div class="row"><div><h2 style="margin:0">Elternbereich</h2><div class="small">Bärflix ${VERSION}</div></div><span class="spacer"></span><button class="btn" data-action="exitAdmin">Kinderansicht</button></div><div class="tabs">${[['overview','Übersicht'],['series','Serien'],['kids','Kinder'],['settings','Einstellungen'],['backup','Backup']].map(([id,l])=>`<button class="btn tab ${adminTab===id?'active':''}" data-tab="${id}">${l}</button>`).join('')}</div>${adminContent()}</section>`)}
function adminContent(){if(adminTab==='overview')return `<div class="adminList"><div class="adminItem"><span style="font-size:35px">👦</span><div><b>${state.kids.length} Kinderprofile</b><span class="small">Ludwig und Fabian</span></div></div><div class="adminItem"><span style="font-size:35px">📺</span><div><b>${state.collections.length} Serien</b><span class="small">${state.collections.reduce((n,c)=>n+c.episodes.length,0)} Folgen</span></div></div><div class="adminItem"><span style="font-size:35px">🎟️</span><div><b>Ticket-System bereit</b><span class="small">PIN und Ticketwechsel wurden neu aufgebaut</span></div></div></div>`;
if(adminTab==='series')return `<div class="row" style="margin-bottom:13px"><button class="btn primary" data-action="addSeries">＋ Serie</button></div><div class="adminList">${state.collections.map(c=>`<div class="adminItem"><div style="font-size:30px">📺</div><div class="spacer"><b>${esc(c.title)}</b><span class="small">${esc(c.category)} · ${c.episodes.length} Folge(n)</span></div><button class="btn" data-edit-series="${c.id}">Bearbeiten</button></div>`).join('')}</div>`;
if(adminTab==='kids')return `<div class="adminList">${state.kids.map(k=>`<div class="adminItem"><div style="font-size:38px">${esc(k.avatar)}</div><div class="spacer"><b>${esc(k.name)}</b><span class="small">Standardticket: ${k.minutes} Minuten</span></div><button class="btn" data-edit-kid="${k.id}">Bearbeiten</button></div>`).join('')}</div>`;
if(adminTab==='settings')return `<div class="form"><div class="field"><label>Neue Eltern-PIN</label><input id="newPin" inputmode="numeric" value="${esc(state.pin)}" maxlength="8"></div><div class="switch"><span><b>Lieblingsserien automatisch nach vorn</b></span><input id="smartSort" type="checkbox" ${state.settings.smartSort?'checked':''}></div><button class="btn primary" data-action="saveSettings">Speichern</button><button class="btn danger" data-action="resetApp">App vollständig zurücksetzen</button></div>`;
return `<div class="form"><button class="btn primary" data-action="export">Backup herunterladen</button><div class="field"><label>Backup importieren</label><input id="importFile" type="file" accept="application/json"></div><button class="btn" data-action="import">Ausgewählte Datei importieren</button><div class="small">Profile, Serien, Favoriten und Verlauf werden gesichert.</div></div>`}
function editSeriesModal(id){const c=id?state.collections.find(x=>x.id===id):{id:'',title:'',category:'Fahrzeuge',active:true,audience:['all'],episodes:[]};return `<div class="overlay"><div class="modal"><div class="modalHead"><h2>${id?'Serie bearbeiten':'Serie hinzufügen'}</h2><span class="spacer"></span><button class="btn" data-action="closeModal">✕</button></div><div class="form"><input type="hidden" id="seriesId" value="${esc(c.id)}"><div class="field"><label>Titel</label><input id="seriesTitle" value="${esc(c.title)}"></div><div class="field"><label>Kategorie</label><select id="seriesCategory">${['Fahrzeuge','Tiere','Wissen & Technik','Musik','Gute Nacht','Kino'].map(x=>`<option ${x===c.category?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>YouTube-Link für eine neue Folge</label><input id="episodeUrl" placeholder="https://youtu.be/..."></div><div class="field"><label>Titel der neuen Folge</label><input id="episodeTitle" placeholder="Folgentitel"></div><button class="btn primary" data-action="saveSeries">Speichern</button>${id?`<h3>Folgen</h3><div class="adminList">${c.episodes.map(e=>`<div class="adminItem"><div class="spacer"><b>${esc(e.title)}</b><span class="small">${esc(e.youtubeId)}</span></div><button class="btn danger" data-delete-episode="${e.id}" data-parent="${c.id}">Löschen</button></div>`).join('')}</div><button class="btn danger" data-delete-series="${c.id}">Serie löschen</button>`:''}</div></div></div>`}
function editKidModal(id){const k=state.kids.find(x=>x.id===id);return `<div class="overlay"><div class="modal"><div class="modalHead"><h2>Profil bearbeiten</h2><span class="spacer"></span><button class="btn" data-action="closeModal">✕</button></div><div class="form"><input type="hidden" id="kidId" value="${esc(k.id)}"><div class="field"><label>Name</label><input id="kidName" value="${esc(k.name)}"></div><div class="field"><label>Symbol</label><input id="kidAvatar" value="${esc(k.avatar)}"></div><div class="field"><label>Normales Ticket in Minuten</label><input id="kidMinutes" type="number" min="5" max="180" value="${k.minutes}"></div><button class="btn primary" data-action="saveKid">Speichern</button></div></div></div>`}
function stickerModal(){return `<div class="overlay"><div class="modal"><div class="modalHead"><h2>${esc(kid.name)}s Stickerbuch</h2><span class="spacer"></span><button class="btn" data-action="closeModal">✕</button></div><div class="stickerGrid">${STICKERS.map((s,i)=>`<div class="sticker ${i<earned()?'on':''}">${i<earned()?s:'🔒'}</div>`).join('')}</div></div></div>`}
function render(){document.body.classList.toggle('largeText',!!state.settings.largeText);let html=screen==='profiles'?profilesView():screen==='tickets'?ticketsView():screen==='library'?libraryView():screen==='collection'?collectionView():screen==='admin'?adminView():profilesView();if(modal==='parent')html+=parentModal();if(modal?.startsWith('series:'))html+=editSeriesModal(modal.split(':')[1]||'');if(modal?.startsWith('kid:'))html+=editKidModal(modal.split(':')[1]);if(modal==='stickers')html+=stickerModal();root.innerHTML=html;bind()}
function bind(){document.querySelectorAll('[data-kid]').forEach(b=>b.onclick=()=>{kid=state.kids.find(k=>k.id===b.dataset.kid);if(!kid)return toast('Profil nicht gefunden');screen='tickets';render()});document.querySelectorAll('[data-ticket]').forEach(b=>b.onclick=()=>{if(!kid){screen='profiles';return render()}const base=Math.max(5,Number(kid.minutes)||15);ticket={type:b.dataset.ticket,minutes:b.dataset.ticket==='short'?Math.max(5,Math.round(base/2)):b.dataset.ticket==='bonus'?base+10:base,startedAt:Date.now()};screen='library';place='all';render()});document.querySelectorAll('[data-place]').forEach(b=>b.onclick=()=>{place=b.dataset.place;render()});document.querySelectorAll('[data-series]').forEach(b=>b.onclick=()=>{collectionId=b.dataset.series;screen='collection';render()});document.querySelectorAll('[data-play]').forEach(b=>b.onclick=()=>playEpisode(b.dataset.c,b.dataset.play));document.querySelectorAll('[data-fav]').forEach(b=>b.onclick=()=>toggleFav(b.dataset.fav));document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{adminTab=b.dataset.tab;render()});document.querySelectorAll('[data-edit-series]').forEach(b=>b.onclick=()=>{modal='series:'+b.dataset.editSeries;render()});document.querySelectorAll('[data-edit-kid]').forEach(b=>b.onclick=()=>{modal='kid:'+b.dataset.editKid;render()});document.querySelectorAll('[data-delete-series]').forEach(b=>b.onclick=()=>deleteSeries(b.dataset.deleteSeries));document.querySelectorAll('[data-delete-episode]').forEach(b=>b.onclick=()=>deleteEpisode(b.dataset.parent,b.dataset.deleteEpisode));document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>action(b.dataset.action));}
function action(a){if(a==='parent'){modal='parent';return render()}if(a==='closeModal'){modal=null;return render()}if(a==='unlock'){const pin=document.getElementById('pinInput')?.value||'';if(pin===state.pin){modal=null;screen='admin';adminTab='overview';render()}else toast('PIN stimmt nicht')}if(a==='backProfiles'){kid=null;screen='profiles';render()}if(a==='backLibrary'){screen='library';render()}if(a==='exitAdmin'){screen=kid?'library':'profiles';render()}if(a==='addSeries'){modal='series:';render()}if(a==='saveSeries')saveSeriesForm();if(a==='saveKid')saveKidForm();if(a==='saveSettings')saveSettings();if(a==='resetApp')resetApp();if(a==='export')exportBackup();if(a==='import')importBackup();if(a==='stickers'){modal='stickers';render()}}
function toggleFav(id){const arr=safeArray(state.favorites[kid.id]);state.favorites[kid.id]=arr.includes(id)?arr.filter(x=>x!==id):[...arr,id];save();render()}
function playEpisode(cid,eid){const c=state.collections.find(x=>x.id===cid),e=c?.episodes.find(x=>x.id===eid);if(!e)return toast('Folge nicht gefunden');state.history.push({kidId:kid.id,collectionId:cid,episodeId:eid,at:new Date().toISOString()});save();const player=document.createElement('div');player.className='player';player.innerHTML=`<div class="playerTop"><button class="btn" id="closePlayer">← Zurück</button><b>${esc(e.title)}</b></div><iframe allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen src="https://www.youtube-nocookie.com/embed/${e.youtubeId}?autoplay=1&rel=0"></iframe>`;document.body.appendChild(player);player.querySelector('#closePlayer').onclick=()=>player.remove()}
function saveSeriesForm(){const id=document.getElementById('seriesId').value,title=document.getElementById('seriesTitle').value.trim(),category=document.getElementById('seriesCategory').value,url=document.getElementById('episodeUrl').value.trim(),epTitle=document.getElementById('episodeTitle').value.trim();if(!title)return toast('Bitte einen Titel eingeben');let c=id?state.collections.find(x=>x.id===id):null;if(!c){c={id:uid('series'),title,category,active:true,audience:['all'],episodes:[]};state.collections.push(c)}c.title=title;c.category=category;if(url){const y=extractYouTubeId(url);if(!y)return toast('YouTube-Link nicht erkannt');c.episodes.push({id:uid('episode'),title:epTitle||'Neue Folge',youtubeId:y})}save();modal=null;render();toast('Serie gespeichert')}
function saveKidForm(){const id=document.getElementById('kidId').value,k=state.kids.find(x=>x.id===id);if(!k)return;k.name=document.getElementById('kidName').value.trim()||k.name;k.avatar=document.getElementById('kidAvatar').value.trim()||k.avatar;k.minutes=Math.max(5,Number(document.getElementById('kidMinutes').value)||15);save();modal=null;render();toast('Profil gespeichert')}
function saveSettings(){const p=document.getElementById('newPin').value.trim();if(!/^\d{4,8}$/.test(p))return toast('PIN muss 4 bis 8 Ziffern haben');state.pin=p;state.settings.smartSort=document.getElementById('smartSort').checked;save();toast('Einstellungen gespeichert')}
function deleteSeries(id){if(!confirm('Serie wirklich löschen?'))return;state.collections=state.collections.filter(c=>c.id!==id);save();modal=null;render()}
function deleteEpisode(cid,eid){const c=state.collections.find(x=>x.id===cid);if(!c)return;c.episodes=c.episodes.filter(e=>e.id!==eid);save();modal='series:'+cid;render()}
function resetApp(){if(!confirm('Bärflix wirklich vollständig zurücksetzen?'))return;state=defaults();save();kid=null;ticket=null;modal=null;screen='profiles';render();toast('Bärflix wurde zurückgesetzt')}
function exportBackup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Baerflix-Backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function importBackup(){const f=document.getElementById('importFile')?.files?.[0];if(!f)return toast('Bitte eine Datei auswählen');const r=new FileReader();r.onload=()=>{try{state=normalize(JSON.parse(r.result));save();toast('Backup importiert');render()}catch(e){toast('Backup konnte nicht gelesen werden')}};r.readAsText(f)}
window.addEventListener('error',e=>{console.error(e.error||e.message);toast('Etwas hat nicht funktioniert')});
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(console.warn));
render();
</script>
</body>
</html>
