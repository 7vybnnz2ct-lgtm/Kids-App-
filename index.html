<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFCF5">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Kinder-Tube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
  :root{
    --sun:#FFC93C; --sky:#3FA7D6; --grass:#5FC98D; --coral:#FF6B6B;
    --cream:#FFFCF5; --ink:#2D2A4A; --ink-soft:#6B6890;
    --card-shadow: 0 6px 0 rgba(45,42,74,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--cream);font-family:'Nunito',sans-serif;color:var(--ink);}
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  button,input{font:inherit;}
  #app{min-height:100vh;display:flex;flex-direction:column;}

  .kid-header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px 10px 28px;}
  .kid-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:26px;color:var(--ink);display:flex;align-items:center;gap:10px;}
  .kid-title .dot{width:14px;height:14px;border-radius:50%;background:var(--coral);display:inline-block;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .gear-btn{width:44px;height:44px;border-radius:50%;border:none;background:rgba(45,42,74,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--ink-soft);}
  .gear-btn:hover{background:rgba(45,42,74,0.12);}
  .gear-btn:focus-visible{outline:3px solid var(--sky);outline-offset:2px;}
  .text-link{background:none;border:none;color:var(--ink-soft);text-decoration:underline;cursor:pointer;font-size:14px;font-weight:600;}

  .grid{flex:1;display:grid;gap:22px;padding:6px 28px 40px 28px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));align-content:start;}
  .card{background:white;border-radius:22px;box-shadow:var(--card-shadow);cursor:pointer;overflow:hidden;border:3px solid transparent;transition:transform .12s ease, border-color .12s ease;display:flex;flex-direction:column;}
  .card:hover{transform:translateY(-4px);}
  .card:focus-visible{outline:none;border-color:var(--sky);}
  .thumb-wrap{position:relative;width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,var(--sky),var(--grass));overflow:hidden;}
  .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .play-badge{position:absolute;bottom:10px;right:10px;width:38px;height:38px;border-radius:50%;background:var(--coral);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 3px 0 rgba(0,0,0,0.15);}
  .playlist-badge{position:absolute;top:10px;left:10px;background:rgba(45,42,74,0.75);color:white;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.03em;}
  .card-title{padding:12px 14px 16px 14px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;line-height:1.25;color:var(--ink);}

  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:14px;}
  .empty .big-emoji{font-size:56px;}
  .empty h2{font-family:'Baloo 2',sans-serif;margin:0;font-size:22px;}
  .empty p{color:var(--ink-soft);max-width:340px;margin:0;font-size:15px;}

  .banner{margin:0 28px 4px 28px;background:linear-gradient(90deg,var(--sun),#ffdd77);border-radius:16px;padding:14px 20px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:15px;color:var(--ink);}
  .banner-note{margin:0 28px 14px 28px;color:var(--ink-soft);font-size:13px;}

  .player-screen{flex:1;display:flex;flex-direction:column;padding:16px 20px 24px 20px;gap:14px;position:relative;min-height:100vh;}
  .player-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
  .top-left{display:flex;gap:10px;flex-wrap:wrap;}
  .back-btn{background:var(--ink-soft);color:white;border:none;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:15px;padding:10px 18px;border-radius:14px;cursor:pointer;box-shadow:0 4px 0 #514f77;}
  .back-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #514f77;}
  .allowance-pill{background:var(--ink);color:white;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;padding:8px 18px;border-radius:20px;}
  .video-wrap{flex:1;min-height:320px;border-radius:20px;overflow:hidden;background:black;box-shadow:var(--card-shadow);}
  .video-wrap iframe, .video-wrap>div{width:100%;height:100%;border:0;}

  .profiles-grid{flex:1;display:flex;flex-wrap:wrap;gap:24px;padding:20px 28px;align-content:flex-start;justify-content:center;align-items:center;}
  .profile-card{background:white;border-radius:24px;box-shadow:var(--card-shadow);padding:28px 32px;cursor:pointer;text-align:center;min-width:150px;border:3px solid transparent;}
  .profile-card:hover{transform:translateY(-4px);}
  .profile-card:focus-visible{outline:none;border-color:var(--sky);}
  .profile-avatar{font-size:42px;margin-bottom:8px;}
  .profile-name{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:18px;}

  .chip-screen{flex:1;padding:20px 28px 40px 28px;}
  .chip-grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-top:18px;}
  .chip-tile{background:white;border-radius:20px;padding:22px 16px;text-align:center;box-shadow:var(--card-shadow);cursor:pointer;border:3px solid transparent;}
  .chip-tile:hover{transform:translateY(-3px);}
  .chip-tile.used{opacity:.4;cursor:not-allowed;transform:none;background:#EFEDF5;}
  .chip-tile .chip-icon{font-size:38px;margin-bottom:8px;}
  .chip-tile .chip-label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;}
  .chip-tile .chip-sub{font-size:12px;color:var(--ink-soft);margin-top:4px;}

  .overlay{position:fixed;inset:0;background:rgba(45,42,74,0.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20;}
  .panel{background:white;border-radius:24px;padding:32px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.25);}
  .panel h2{font-family:'Baloo 2',sans-serif;margin:0 0 6px 0;font-size:22px;}
  .panel .sub{color:var(--ink-soft);font-size:14px;margin:0 0 20px 0;}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin:20px 0;}
  .pin-dots span{width:16px;height:16px;border-radius:50%;background:#E5E1F5;display:inline-block;}
  .pin-dots span.filled{background:var(--sky);}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .pin-pad button{padding:16px 0;border-radius:14px;border:none;background:#F3F1FA;font-size:20px;font-weight:700;cursor:pointer;color:var(--ink);font-family:'Nunito',sans-serif;}
  .pin-pad button:hover{background:#E8E4F7;}
  .pin-error{color:var(--coral);font-size:13px;text-align:center;min-height:18px;margin-top:8px;font-weight:700;}
  .close-x{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);}
  .full-btn{width:100%;border:none;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:15px;padding:14px;border-radius:14px;cursor:pointer;margin-bottom:10px;color:white;}

  .dash{flex:1;padding:28px;max-width:820px;margin:0 auto;width:100%;}
  .dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .dash-header h1{font-family:'Baloo 2',sans-serif;font-size:26px;margin:0;}
  .done-btn{background:var(--grass);color:white;border:none;font-family:'Baloo 2',sans-serif;font-weight:700;padding:10px 20px;border-radius:14px;cursor:pointer;box-shadow:0 3px 0 #3d9c68;}
  .section{background:white;border-radius:20px;padding:20px;box-shadow:var(--card-shadow);margin-bottom:24px;}
  .section h2{font-family:'Baloo 2',sans-serif;font-size:18px;margin:0 0 14px 0;}
  .add-form label{font-weight:700;font-size:14px;display:block;margin-bottom:6px;}
  .add-form input[type=text]{width:100%;padding:12px 14px;border-radius:12px;border:2px solid #E5E1F5;font-size:15px;margin-bottom:12px;font-family:'Nunito',sans-serif;}
  .add-form input[type=text]:focus{outline:none;border-color:var(--sky);}
  .add-row{display:flex;gap:10px;align-items:flex-end;}
  .add-row .field{flex:1;}
  .add-btn{background:var(--sky);color:white;border:none;font-family:'Baloo 2',sans-serif;font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer;white-space:nowrap;height:46px;}
  .add-btn:disabled{opacity:.5;cursor:not-allowed;}
  .form-msg{font-size:13px;margin-top:8px;font-weight:600;}
  .form-msg.error{color:var(--coral);}
  .form-msg.ok{color:var(--grass);}

  .list-item{display:flex;align-items:center;gap:14px;background:#FBFAF6;border-radius:16px;padding:10px;margin-bottom:10px;}
  .list-thumb{width:80px;height:52px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,var(--sky),var(--grass));flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;}
  .list-thumb img{width:100%;height:100%;object-fit:cover;}
  .list-title{flex:1;font-weight:700;font-size:14px;}
  .list-type{font-size:11px;color:var(--ink-soft);font-weight:600;}
  .remove-btn{background:#FFECEC;color:var(--coral);border:none;padding:8px 14px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;}
  .remove-btn:hover{background:#FFDCDC;}

  .kid-row{display:flex;align-items:center;gap:12px;background:#FBFAF6;border-radius:16px;padding:12px 16px;margin-bottom:10px;flex-wrap:wrap;}
  .kid-row .kid-name{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;flex:1;min-width:100px;}
  .chip-status{display:flex;gap:6px;flex-wrap:wrap;}
  .chip-status span{font-size:11px;background:#EFEDF5;color:var(--ink-soft);padding:4px 9px;border-radius:10px;font-weight:700;}
  .chip-status span.on{background:#E4F7ED;color:var(--grass);}
  .chip-status span.live{background:#FFF3D6;color:#9a7b1e;}
  .bonus-ctrl{display:flex;align-items:center;gap:6px;background:white;border-radius:12px;padding:4px 8px;}
  .bonus-ctrl button{width:26px;height:26px;border-radius:50%;border:none;background:var(--sun);cursor:pointer;font-weight:800;font-size:14px;}
  .bonus-ctrl .count{font-weight:800;min-width:16px;text-align:center;}
  .small-btn{background:var(--ink);color:white;border:none;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;}
  .add-kid-row{display:flex;gap:10px;margin-top:8px;}
  .add-kid-row input{flex:1;padding:10px 14px;border-radius:10px;border:2px solid #E5E1F5;font-size:14px;}
  .pin-settings input{padding:10px;border-radius:10px;border:2px solid #E5E1F5;font-size:14px;width:120px;margin-right:10px;}
  .settings-row{display:flex;gap:10px;align-items:center;margin-top:6px;}
  .settings-row input{width:80px;padding:10px;border-radius:10px;border:2px solid #E5E1F5;font-size:14px;}
  .storage-warning{margin:0 28px 16px;padding:12px 16px;border-radius:14px;background:#FFF3D6;color:#715a13;font-size:13px;font-weight:700;display:none;}

  @media (max-width:700px){
    .kid-header,.grid,.dash,.chip-screen{padding-left:16px;padding-right:16px;}
    .banner,.banner-note{margin-left:16px;margin-right:16px;}
    .add-row{flex-direction:column;align-items:stretch;}
    .add-btn{width:100%;}
    .video-wrap{min-height:240px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  const DEFAULT_PIN = "1234";
  const KID_AVATARS = ["🦁","🐼","🦊","🐸","🐨","🐯","🐵","🦉"];
  const PREFIX = "kinder_tube_";

  const storage = {
    available: true,
    get(key){
      try{
        const value = localStorage.getItem(PREFIX + key);
        return value;
      }catch(e){
        this.available = false;
        return null;
      }
    },
    set(key, value){
      try{
        localStorage.setItem(PREFIX + key, value);
        return true;
      }catch(e){
        this.available = false;
        return false;
      }
    }
  };

  let state = {
    view: "loading",
    items: [],
    pin: DEFAULT_PIN,
    kids: [],
    chipStates: {},
    settings: { minutesPerFolge: 15 },
    currentKidId: null,
    playing: null,
    pinInput: "",
    pinError: "",
    formError: "",
    formOk: "",
    urlValue: "",
    labelValue: "",
    fetching: false,
    newPin1: "",
    newKidName: "",
  };

  let ytPlayer = null;
  let timerInterval = null;
  let tickCounter = 0;
  window.onYouTubeIframeAPIReady = function(){};

  function todayStr(){
    const d = new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
  }
  function formatMMSS(totalSeconds){
    const t = Math.max(0, Math.round(totalSeconds));
    const m = Math.floor(t/60);
    const s = t%60;
    return m+":"+String(s).padStart(2,'0');
  }
  function readJSON(key, fallback){
    const raw = storage.get(key);
    if(raw === null) return fallback;
    try{return JSON.parse(raw);}catch(e){return fallback;}
  }
  function saveJSON(key, value){ storage.set(key, JSON.stringify(value)); }

  function showFileProtocolWarning(){
    if(location.protocol !== 'file:') return;
    setTimeout(() => {
      alert('Diese Datei wurde direkt geöffnet. Der YouTube-Player benötigt aus Sicherheitsgründen eine HTTP- oder HTTPS-Adresse. Bitte Kinder-Tube über localhost oder eine Webadresse öffnen.');
    }, 300);
  }

  function loadData(){
    state.items = readJSON('items', []);
    state.pin = storage.get('pin') || DEFAULT_PIN;
    state.kids = readJSON('profiles', []);
    state.chipStates = readJSON('chipstates', {});
    state.settings = readJSON('settings', { minutesPerFolge: 15 });

    if(state.kids.length === 1){ state.currentKidId = state.kids[0].id; state.view = "kidHome"; }
    else if(state.kids.length === 0){ state.view = "kidHome"; }
    else { state.view = "profilePick"; }
    render();
  }

  function saveItems(){ saveJSON('items', state.items); }
  function savePin(pin){ storage.set('pin', pin); }
  function saveKids(){ saveJSON('profiles', state.kids); }
  function saveChipStates(){ saveJSON('chipstates', state.chipStates); }
  function saveSettings(){ saveJSON('settings', state.settings); }

  function ensureChipState(kidId){
    const today = todayStr();
    let cs = state.chipStates[kidId];
    if(!cs || cs.date !== today){
      cs = { date: today, standardUsed: {one1:false, one2:false, two:false}, bonus: (cs ? cs.bonus : 0), pendingAllowance: null };
      state.chipStates[kidId] = cs;
      saveChipStates();
    }
    return cs;
  }
  function hasAnyChipAvailable(cs){
    return !cs.standardUsed.one1 || !cs.standardUsed.one2 || !cs.standardUsed.two || cs.bonus > 0;
  }

  function parseYouTube(url){
    try{
      const u = new URL(url.trim());
      const host = u.hostname.replace('www.','');
      if(host === 'youtu.be'){ const id = u.pathname.slice(1).split('/')[0]; if(id) return {type:'video', id}; }
      if(host.includes('youtube.com')){
        if(u.pathname === '/playlist' && u.searchParams.get('list')) return {type:'playlist', id:u.searchParams.get('list')};
        if(u.pathname.startsWith('/embed/')){ const id = u.pathname.split('/')[2]; if(id) return {type:'video', id}; }
        if(u.pathname.startsWith('/shorts/')){ const id = u.pathname.split('/')[2]; if(id) return {type:'video', id}; }
        if(u.searchParams.get('v')) return {type:'video', id:u.searchParams.get('v')};
      }
    }catch(e){}
    return null;
  }
  async function fetchTitle(originalUrl){
    try{
      const res = await fetch('https://www.youtube.com/oembed?url=' + encodeURIComponent(originalUrl) + '&format=json');
      if(!res.ok) return null;
      const data = await res.json();
      return data.title || null;
    }catch(e){ return null; }
  }
  function escapeHtml(str){ return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function storageWarningHtml(){
    return '<div id="storageWarning" class="storage-warning" style="'+(storage.available?'display:none;':'display:block;')+'">⚠️ Der Browser erlaubt hier keine dauerhafte Speicherung. Öffne die Datei möglichst in Safari oder über eine lokale Webserver-App.</div>';
  }

  function render(){
    const app = document.getElementById('app');
    if(state.view === 'loading'){ app.innerHTML = '<div class="empty"><div class="big-emoji">⏳</div></div>'; return; }
    if(state.view === 'profilePick') return renderProfilePick(app);
    if(state.view === 'kidHome') return renderKidHome(app);
    if(state.view === 'chipSelect') return renderChipSelect(app);
    if(state.view === 'grid') return renderGrid(app);
    if(state.view === 'player') return renderPlayer(app);
    if(state.view === 'pin') return renderPin(app);
    if(state.view === 'dash') return renderDash(app);
  }

  function renderProfilePick(app){
    let html = '<div class="kid-header"><div class="kid-title"><span class="dot"></span>Kinder-Tube</div>';
    html += '<button class="gear-btn" id="gearBtn" aria-label="Eltern-Bereich" title="Eltern-Bereich">⚙️</button></div>';
    html += storageWarningHtml();
    html += '<div class="profiles-grid">';
    state.kids.forEach((k, i) => {
      html += '<div class="profile-card" tabindex="0" role="button" data-id="'+k.id+'">';
      html += '<div class="profile-avatar">'+KID_AVATARS[i % KID_AVATARS.length]+'</div>';
      html += '<div class="profile-name">'+escapeHtml(k.name)+'</div></div>';
    });
    html += '</div>';
    app.innerHTML = html;
    document.getElementById('gearBtn').onclick = () => { state.view='pin'; state.pinInput=''; state.pinError=''; render(); };
    document.querySelectorAll('.profile-card').forEach(el => {
      const pick = () => { state.currentKidId = el.dataset.id; state.view='kidHome'; render(); };
      el.onclick = pick;
      el.onkeydown = (e) => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); pick(); } };
    });
  }

  function renderKidHome(app){
    let html = '<div class="kid-header"><div class="kid-title"><span class="dot"></span>Kinder-Tube</div>';
    html += '<div class="header-right">';
    if(state.kids.length > 1) html += '<button class="text-link" id="switchKidBtn">Kind wechseln</button>';
    html += '<button class="gear-btn" id="gearBtn" aria-label="Eltern-Bereich" title="Eltern-Bereich">⚙️</button></div></div>';
    html += storageWarningHtml();

    if(state.kids.length === 0){
      html += '<div class="empty"><div class="big-emoji">👋</div><h2>Noch kein Kind eingerichtet</h2><p>Ein Erwachsener kann über das Zahnrad oben rechts ein Kind anlegen.</p></div>';
      app.innerHTML = html;
      document.getElementById('gearBtn').onclick = () => { state.view='pin'; state.pinInput=''; state.pinError=''; render(); };
      return;
    }

    const kid = state.kids.find(k => k.id === state.currentKidId) || state.kids[0];
    state.currentKidId = kid.id;
    const cs = ensureChipState(state.currentKidId);
    const anyAvailable = hasAnyChipAvailable(cs);

    html += '<div class="empty">';
    html += '<div class="big-emoji">'+KID_AVATARS[state.kids.findIndex(k=>k.id===kid.id) % KID_AVATARS.length]+'</div>';
    html += '<h2>Hallo, '+escapeHtml(kid.name)+'!</h2>';

    if(cs.pendingAllowance){
      html += '<p>Du hast noch '+formatMMSS(cs.pendingAllowance.remainingSeconds)+' Minuten zum Weiterschauen übrig.</p>';
      html += '<button class="add-btn" id="resumeBtn" style="margin-top:6px;">Weiterschauen ▶</button>';
    } else if(anyAvailable){
      html += '<p>Möchtest du einen Chip einlösen und eine Folge schauen?</p>';
      html += '<button class="add-btn" id="redeemBtn" style="margin-top:6px;">Chip einlösen 🎟️</button>';
    } else {
      html += '<p>Für heute sind alle Chips aufgebraucht. Morgen gibt es wieder neue! 🎉</p>';
    }
    html += '</div>';

    app.innerHTML = html;
    document.getElementById('gearBtn').onclick = () => { state.view='pin'; state.pinInput=''; state.pinError=''; render(); };
    if(state.kids.length > 1) document.getElementById('switchKidBtn').onclick = () => { state.currentKidId=null; state.view='profilePick'; render(); };
    if(cs.pendingAllowance) document.getElementById('resumeBtn').onclick = () => { state.view='grid'; render(); };
    else if(anyAvailable) document.getElementById('redeemBtn').onclick = () => { state.view='chipSelect'; render(); };
  }

  function renderChipSelect(app){
    const cs = ensureChipState(state.currentKidId);
    const mp = state.settings.minutesPerFolge || 15;
    let html = '<div class="chip-screen">';
    html += '<button class="text-link" id="backHomeBtn">← Zurück</button>';
    html += '<h2 style="font-family:\'Baloo 2\',sans-serif;">Welchen Chip möchtest du einlösen?</h2>';
    html += '<div class="chip-grid">';
    function tile(id, used, icon, label, sub){
      return '<div class="chip-tile '+(used?'used':'')+'" data-chip="'+id+'" tabindex="'+(used?'-1':'0')+'" role="button">'
        +'<div class="chip-icon">'+icon+'</div><div class="chip-label">'+label+'</div>'
        +(sub?'<div class="chip-sub">'+sub+'</div>':'')+'</div>';
    }
    html += tile('one1', cs.standardUsed.one1, '🎟️', '1 Folge', cs.standardUsed.one1?'eingelöst':('≈'+mp+' Min'));
    html += tile('one2', cs.standardUsed.one2, '🎟️', '1 Folge', cs.standardUsed.one2?'eingelöst':('≈'+mp+' Min'));
    html += tile('two', cs.standardUsed.two, '🎫', '2 Folgen', cs.standardUsed.two?'eingelöst':('≈'+(mp*2)+' Min'));
    if(cs.bonus > 0) html += tile('bonus', false, '⭐', 'Bonus-Chip', '≈'+mp+' Min · noch '+cs.bonus+'x da');
    html += '</div></div>';
    app.innerHTML = html;
    document.getElementById('backHomeBtn').onclick = () => { state.view='kidHome'; render(); };
    document.querySelectorAll('.chip-tile:not(.used)').forEach(el => {
      const choose = () => {
        const chip = el.dataset.chip;
        let minutes = mp;
        if(chip === 'one1'){ cs.standardUsed.one1 = true; }
        else if(chip === 'one2'){ cs.standardUsed.one2 = true; }
        else if(chip === 'two'){ cs.standardUsed.two = true; minutes = mp*2; }
        else if(chip === 'bonus'){ cs.bonus -= 1; }
        cs.pendingAllowance = { remainingSeconds: minutes*60, switchesUsed:0, switchLimit:1, awaitingParentDecision:false, overtimeApproved:false };
        saveChipStates();
        state.view = 'grid';
        render();
      };
      el.onclick = choose;
      el.onkeydown = (e) => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); choose(); } };
    });
  }

  function renderGrid(app){
    const cs = ensureChipState(state.currentKidId);
    if(!cs.pendingAllowance){ state.view='kidHome'; render(); return; }
    let html = '<div class="kid-header"><button class="text-link" id="backHomeBtn">← Zurück</button>';
    html += '<button class="gear-btn" id="gearBtn" aria-label="Eltern-Bereich">⚙️</button></div>';
    html += '<div class="banner">🎬 Noch '+formatMMSS(cs.pendingAllowance.remainingSeconds)+' Minuten übrig — wähl aus, was du schauen möchtest!</div>';
    if(cs.pendingAllowance.switchesUsed < cs.pendingAllowance.switchLimit){
      html += '<div class="banner-note">Du darfst dein Video einmal wechseln, falls es dir nicht gefällt.</div>';
    }
    if(state.items.length === 0){
      html += '<div class="empty"><div class="big-emoji">📺</div><h2>Noch nichts zum Schauen</h2><p>Ein Erwachsener kann über das Zahnrad Videos hinzufügen.</p></div>';
    } else {
      html += '<div class="grid">';
      state.items.forEach((item, idx) => {
        const thumb = item.type === 'video'
          ? '<img src="https://img.youtube.com/vi/'+item.videoId+'/hqdefault.jpg" alt="">'
          : '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:40px;">🎵</div>';
        html += '<div class="card" tabindex="0" role="button" data-idx="'+idx+'">';
        html += '<div class="thumb-wrap">'+thumb;
        if(item.type === 'playlist') html += '<div class="playlist-badge">PLAYLIST</div>';
        html += '<div class="play-badge">▶</div></div>';
        html += '<div class="card-title">'+escapeHtml(item.title)+'</div></div>';
      });
      html += '</div>';
    }
    app.innerHTML = html;
    document.getElementById('backHomeBtn').onclick = () => { state.view='kidHome'; render(); };
    document.getElementById('gearBtn').onclick = () => { state.view='pin'; state.pinInput=''; state.pinError=''; render(); };
    document.querySelectorAll('.card').forEach(el => {
      const play = () => { state.playing = state.items[parseInt(el.dataset.idx)]; state.view='player'; render(); };
      el.onclick = play;
      el.onkeydown = (e) => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); play(); } };
    });
  }

  function renderPlayer(app){
    const cs = ensureChipState(state.currentKidId);
    if(!cs.pendingAllowance || !state.playing){ state.view='grid'; render(); return; }
    const allowSwitch = cs.pendingAllowance.switchesUsed < cs.pendingAllowance.switchLimit;
    let html = '<div class="player-screen">';
    html += '<div class="player-top"><div class="top-left">';
    if(allowSwitch) html += '<button class="back-btn" id="switchBtn">🔀 Anderes Video</button>';
    html += '<button class="text-link" id="endSessionBtn">Für heute beenden</button>';
    html += '</div><span class="allowance-pill" id="timerPill">'+formatMMSS(cs.pendingAllowance.remainingSeconds)+'</span></div>';
    html += '<div class="video-wrap"><div id="ytplayer"></div></div>';
    html += '<div id="playerOverlay" class="overlay" style="display:none;"></div>';
    html += '</div>';
    app.innerHTML = html;

    document.getElementById('endSessionBtn').onclick = () => {
      cs.pendingAllowance = null;
      saveChipStates();
      destroyPlayer();
      state.view = 'kidHome'; state.playing = null;
      render();
    };
    if(allowSwitch){
      document.getElementById('switchBtn').onclick = () => {
        cs.pendingAllowance.switchesUsed += 1;
        saveChipStates();
        destroyPlayer();
        state.view = 'grid'; state.playing = null;
        render();
      };
    }
    startPlayer();
  }

  function destroyPlayer(){
    if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
    if(ytPlayer){ try{ ytPlayer.destroy(); }catch(e){} ytPlayer = null; }
  }

  function startPlayer(){
    const item = state.playing;
    const create = () => {
      const vars = { autoplay:1, rel:0, modestbranding:1, playsinline:1, fs:1 };
      // YouTube requires an identifiable HTTP(S) origin for the controllable iframe player.
      // This works when the page is served as http://localhost... or from an HTTPS website.
      if(location.protocol === 'http:' || location.protocol === 'https:'){
        vars.origin = location.origin;
      }
      const opts = {
        height:'100%',
        width:'100%',
        playerVars: vars,
        events:{
          onStateChange:onPlayerStateChange,
          onError:onPlayerError
        }
      };
      if(item.type === 'video') opts.videoId = item.videoId;
      else { vars.listType = 'playlist'; vars.list = item.playlistId; }
      ytPlayer = new YT.Player('ytplayer', opts);
      tickCounter = 0;
      timerInterval = setInterval(tick, 1000);
    };
    if(window.YT && window.YT.Player) create();
    else {
      const wait = setInterval(() => {
        if(window.YT && window.YT.Player){ clearInterval(wait); create(); }
      }, 200);
      setTimeout(() => clearInterval(wait), 15000);
    }
  }

  function onPlayerError(event){
    const code = event && typeof event.data !== 'undefined' ? event.data : 'unbekannt';
    const ov = document.getElementById('playerOverlay');
    if(!ov) return;
    let explanation = 'Das ausgewählte YouTube-Video konnte nicht geladen werden.';
    if(code === 101 || code === 150){
      explanation = 'Dieses Video darf vom Anbieter nicht in anderen Apps oder Webseiten eingebettet werden.';
    } else if(code === 153 || location.protocol === 'file:'){
      explanation = 'YouTube akzeptiert den Player nicht aus einer direkt geöffneten HTML-Datei. Öffne Kinder-Tube über eine HTTP- oder HTTPS-Adresse, nicht über „file://“.';
    } else if(code === 2){
      explanation = 'Der YouTube-Link oder die Video-ID ist ungültig.';
    } else if(code === 5){
      explanation = 'Der YouTube-Player konnte auf diesem Gerät nicht korrekt gestartet werden.';
    }
    ov.style.display = 'flex';
    ov.innerHTML = '<div class="panel"><h2>⚠️ Video konnte nicht gestartet werden</h2>'
      + '<p class="sub">'+escapeHtml(explanation)+'</p>'
      + '<p class="sub">Fehlercode: '+escapeHtml(code)+'</p>'
      + '<button class="full-btn" id="playerBackBtn" style="background:var(--sky);">Zur Videoauswahl</button></div>';
    document.getElementById('playerBackBtn').onclick = () => {
      destroyPlayer();
      state.view = 'grid';
      state.playing = null;
      render();
    };
  }

  function tick(){
    if(!ytPlayer) return;
    const cs = ensureChipState(state.currentKidId);
    if(!cs.pendingAllowance || cs.pendingAllowance.awaitingParentDecision || cs.pendingAllowance.overtimeApproved) return;
    let st;
    try{ st = ytPlayer.getPlayerState(); }catch(e){ return; }
    if(st !== 1) return;
    cs.pendingAllowance.remainingSeconds -= 1;
    const pill = document.getElementById('timerPill');
    if(pill) pill.textContent = formatMMSS(cs.pendingAllowance.remainingSeconds);
    tickCounter++;
    if(tickCounter % 5 === 0) saveChipStates();
    if(cs.pendingAllowance.remainingSeconds <= 0){
      cs.pendingAllowance.remainingSeconds = 0;
      cs.pendingAllowance.awaitingParentDecision = true;
      saveChipStates();
      try{ ytPlayer.pauseVideo(); }catch(e){}
      showTimeUpOverlay();
    }
  }

  function onPlayerStateChange(event){
    if(event.data !== 0) return;
    const cs = ensureChipState(state.currentKidId);
    if(!cs.pendingAllowance) return;
    if(cs.pendingAllowance.overtimeApproved){
      cs.pendingAllowance = null;
      saveChipStates();
      destroyPlayer();
      state.view = 'kidHome'; state.playing = null;
      render();
      return;
    }
    setTimeout(() => {
      let stillEnded = true;
      try{ if(ytPlayer) stillEnded = (ytPlayer.getPlayerState() === 0); }catch(e){}
      if(!stillEnded) return;
      if(cs.pendingAllowance && cs.pendingAllowance.remainingSeconds > 0){
        destroyPlayer();
        state.view = 'grid'; state.playing = null;
        render();
      } else if(cs.pendingAllowance) {
        cs.pendingAllowance = null;
        saveChipStates();
        destroyPlayer();
        state.view = 'kidHome'; state.playing = null;
        render();
      }
    }, 700);
  }

  function showTimeUpOverlay(){
    const ov = document.getElementById('playerOverlay');
    if(!ov) return;
    ov.style.display = 'flex';
    ov.innerHTML = '<div class="panel"><h2>⏰ Die Zeit ist um!</h2>'
      + '<p class="sub">Frag ein Elternteil, ob du das Video zu Ende schauen darfst.</p>'
      + '<button class="full-btn" id="askParentBtn" style="background:var(--sky);">Elternteil fragen</button>'
      + '<button class="text-link" id="stopNowBtn">Für heute beenden</button></div>';
    document.getElementById('askParentBtn').onclick = showOvertimePinPad;
    document.getElementById('stopNowBtn').onclick = () => {
      const cs = ensureChipState(state.currentKidId);
      cs.pendingAllowance = null;
      saveChipStates();
      destroyPlayer();
      state.view = 'kidHome'; state.playing = null;
      render();
    };
  }

  function showOvertimePinPad(){
    const ov = document.getElementById('playerOverlay');
    let pinInput = '';
    function draw(error){
      const dots = [0,1,2,3].map(i => '<span class="'+(i<pinInput.length?'filled':'')+'"></span>').join('');
      let html = '<div class="panel"><button class="close-x" id="cancelPinBtn">✕</button><h2>Eltern-PIN</h2><p class="sub">Bitte PIN eingeben, um zu entscheiden.</p>';
      html += '<div class="pin-dots">'+dots+'</div><div class="pin-error">'+(error||'')+'</div><div class="pin-pad">';
      ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{ if(k===''){ html+='<div></div>'; return; } html+='<button data-key="'+k+'">'+k+'</button>'; });
      html += '</div></div>';
      ov.innerHTML = html;
      document.getElementById('cancelPinBtn').onclick = showTimeUpOverlay;
      document.querySelectorAll('[data-key]').forEach(btn => {
        btn.onclick = () => {
          const k = btn.dataset.key;
          if(k === '⌫'){ pinInput = pinInput.slice(0,-1); draw(); return; }
          if(pinInput.length >= 4) return;
          pinInput += k;
          if(pinInput.length === 4){
            if(pinInput === state.pin){ showOvertimeDecision(); }
            else { pinInput = ''; draw('Falsche PIN, versuch es nochmal.'); }
          } else draw();
        };
      });
    }
    draw();
  }

  function showOvertimeDecision(){
    const cs = ensureChipState(state.currentKidId);
    const ov = document.getElementById('playerOverlay');
    ov.innerHTML = '<div class="panel"><h2>Video zu Ende schauen?</h2>'
      + '<p class="sub">Die eingestellte Zeit ist um. Darf das aktuelle Video trotzdem zu Ende geschaut werden? Danach ist für heute Schluss.</p>'
      + '<button class="full-btn" id="yesBtn" style="background:var(--grass);">Ja, zu Ende schauen</button>'
      + '<button class="full-btn" id="noBtn" style="background:var(--coral);">Nein, jetzt stoppen</button></div>';
    document.getElementById('yesBtn').onclick = () => {
      cs.pendingAllowance.awaitingParentDecision = false;
      cs.pendingAllowance.overtimeApproved = true;
      saveChipStates();
      ov.style.display = 'none'; ov.innerHTML = '';
      try{ ytPlayer.playVideo(); }catch(e){}
    };
    document.getElementById('noBtn').onclick = () => {
      cs.pendingAllowance = null;
      saveChipStates();
      destroyPlayer();
      state.view = 'kidHome'; state.playing = null;
      render();
    };
  }

  function renderPin(app){
    const dots = [0,1,2,3].map(i => '<span class="'+(i < state.pinInput.length ? 'filled':'')+'"></span>').join('');
    let html = '<div class="overlay"><div class="panel">';
    html += '<button class="close-x" id="closeBtn" aria-label="Schließen">✕</button>';
    html += '<h2>Eltern-Bereich</h2><p class="sub">Gib deine PIN ein.</p>';
    html += '<div class="pin-dots">'+dots+'</div><div class="pin-error">'+state.pinError+'</div><div class="pin-pad">';
    ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k => { if(k===''){ html += '<div></div>'; return; } html += '<button data-key="'+k+'">'+k+'</button>'; });
    html += '</div></div></div>';
    app.innerHTML = html;
    document.getElementById('closeBtn').onclick = () => { state.view = state.currentKidId ? 'kidHome' : (state.kids.length>1?'profilePick':'kidHome'); render(); };
    document.querySelectorAll('[data-key]').forEach(btn => {
      btn.onclick = () => {
        const k = btn.dataset.key;
        if(k === '⌫'){ state.pinInput = state.pinInput.slice(0,-1); state.pinError=''; render(); return; }
        if(state.pinInput.length >= 4) return;
        state.pinInput += k;
        if(state.pinInput.length === 4){
          if(state.pinInput === state.pin){ state.view = 'dash'; state.pinInput=''; }
          else { state.pinError = 'Falsche PIN, versuch es nochmal.'; state.pinInput = ''; }
        }
        render();
      };
    });
  }

  function renderDash(app){
    let html = '<div class="dash">';
    html += '<div class="dash-header"><h1>Eltern-Bereich</h1><button class="done-btn" id="doneBtn">Fertig ✓</button></div>';

    html += '<div class="section"><h2>Kinder & Chips</h2>';
    state.kids.forEach((k, i) => {
      const cs = ensureChipState(k.id);
      html += '<div class="kid-row">';
      html += '<span style="font-size:22px;">'+KID_AVATARS[i%KID_AVATARS.length]+'</span>';
      html += '<div class="kid-name">'+escapeHtml(k.name)+'</div>';
      html += '<div class="chip-status">';
      html += '<span class="'+(cs.standardUsed.one1?'':'on')+'">1 Folge'+(cs.standardUsed.one1?' (genutzt)':'')+'</span>';
      html += '<span class="'+(cs.standardUsed.one2?'':'on')+'">1 Folge'+(cs.standardUsed.one2?' (genutzt)':'')+'</span>';
      html += '<span class="'+(cs.standardUsed.two?'':'on')+'">2 Folgen'+(cs.standardUsed.two?' (genutzt)':'')+'</span>';
      if(cs.pendingAllowance) html += '<span class="live">läuft: '+formatMMSS(cs.pendingAllowance.remainingSeconds)+' übrig</span>';
      html += '</div>';
      html += '<div class="bonus-ctrl"><button data-bonusminus="'+k.id+'">−</button><span class="count">⭐'+cs.bonus+'</span><button data-bonusplus="'+k.id+'">+</button></div>';
      html += '<button class="remove-btn" data-removekid="'+k.id+'">Kind entfernen</button>';
      html += '</div>';
    });
    html += '<div class="add-kid-row"><input type="text" id="newKidInput" placeholder="Name des Kindes" value="'+escapeHtml(state.newKidName)+'">';
    html += '<button class="small-btn" id="addKidBtn">Kind hinzufügen</button></div></div>';

    html += '<div class="section"><h2>Einstellungen</h2>';
    html += '<label style="font-weight:700;font-size:14px;">Minuten pro Folge</label>';
    html += '<div class="settings-row"><input type="number" min="1" max="180" id="minutesInput" value="'+state.settings.minutesPerFolge+'">';
    html += '<button class="small-btn" id="saveMinutesBtn">Speichern</button></div>';
    html += '<p style="color:var(--ink-soft);font-size:13px;margin-top:8px;">Ein „1 Folge"-Chip entspricht dieser Zeit, ein „2 Folgen"-Chip der doppelten Zeit. Der Timer läuft weiter, auch wenn zwischendurch das Video gewechselt wird.</p>';
    html += '</div>';

    html += '<div class="section add-form"><h2>Video oder Playlist hinzufügen</h2>';
    html += '<label for="urlInput">YouTube-Link</label>';
    html += '<input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." value="'+escapeHtml(state.urlValue)+'">';
    html += '<div class="add-row"><div class="field"><label for="labelInput">Eigener Titel (optional)</label>';
    html += '<input type="text" id="labelInput" placeholder="wird automatisch erkannt, falls leer" value="'+escapeHtml(state.labelValue)+'"></div>';
    html += '<button class="add-btn" id="addBtn" '+(state.fetching?'disabled':'')+'>'+(state.fetching?'Lädt…':'Hinzufügen')+'</button></div>';
    if(state.formError) html += '<div class="form-msg error">'+state.formError+'</div>';
    if(state.formOk) html += '<div class="form-msg ok">'+state.formOk+'</div>';
    html += '</div>';

    html += '<div class="section"><h2>Inhalte ('+state.items.length+')</h2>';
    if(state.items.length === 0) html += '<p style="color:var(--ink-soft);">Noch keine Videos hinzugefügt.</p>';
    state.items.forEach((item, idx) => {
      const thumb = item.type === 'video' ? '<img src="https://img.youtube.com/vi/'+item.videoId+'/hqdefault.jpg" alt="">' : '🎵';
      html += '<div class="list-item"><div class="list-thumb">'+thumb+'</div>';
      html += '<div style="flex:1;"><div class="list-title">'+escapeHtml(item.title)+'</div><div class="list-type">'+(item.type==='video'?'Video':'Playlist')+'</div></div>';
      html += '<button class="remove-btn" data-idx="'+idx+'">Entfernen</button></div>';
    });
    html += '</div>';

    html += '<div class="section pin-settings"><h2>PIN ändern</h2>';
    html += '<input type="text" inputmode="numeric" maxlength="4" id="newPinInput" placeholder="4 Ziffern" value="'+escapeHtml(state.newPin1)+'">';
    html += '<button class="small-btn" id="savePinBtn">Speichern</button></div>';
    html += '</div>';
    app.innerHTML = html;

    document.getElementById('doneBtn').onclick = () => {
      if(state.currentKidId) state.view = 'kidHome';
      else if(state.kids.length === 1){ state.currentKidId = state.kids[0].id; state.view = 'kidHome'; }
      else if(state.kids.length > 1) state.view = 'profilePick';
      else state.view = 'kidHome';
      state.formError=''; state.formOk=''; state.urlValue=''; state.labelValue=''; render();
    };
    document.getElementById('urlInput').oninput = (e) => state.urlValue = e.target.value;
    document.getElementById('labelInput').oninput = (e) => state.labelValue = e.target.value;
    document.getElementById('addBtn').onclick = handleAdd;
    document.querySelectorAll('[data-idx]').forEach(btn => {
      btn.onclick = () => { state.items.splice(parseInt(btn.dataset.idx), 1); saveItems(); render(); };
    });
    document.getElementById('newKidInput').oninput = (e) => state.newKidName = e.target.value;
    document.getElementById('addKidBtn').onclick = () => {
      const name = state.newKidName.trim();
      if(!name) return;
      const id = 'k_' + Date.now() + '_' + Math.floor(Math.random()*1000);
      state.kids.push({id, name});
      state.newKidName = '';
      saveKids();
      render();
    };
    document.querySelectorAll('[data-removekid]').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.removekid;
        if(!confirm('Dieses Kind samt Chip-Verlauf wirklich entfernen?')) return;
        state.kids = state.kids.filter(k => k.id !== id);
        delete state.chipStates[id];
        if(state.currentKidId === id) state.currentKidId = null;
        saveKids(); saveChipStates(); render();
      };
    });
    document.querySelectorAll('[data-bonusplus]').forEach(btn => {
      btn.onclick = () => { const cs = ensureChipState(btn.dataset.bonusplus); cs.bonus += 1; saveChipStates(); render(); };
    });
    document.querySelectorAll('[data-bonusminus]').forEach(btn => {
      btn.onclick = () => { const cs = ensureChipState(btn.dataset.bonusminus); cs.bonus = Math.max(0, cs.bonus - 1); saveChipStates(); render(); };
    });
    document.getElementById('saveMinutesBtn').onclick = () => {
      const v = parseInt(document.getElementById('minutesInput').value, 10);
      if(!v || v < 1){ alert('Bitte eine gültige Minutenzahl eingeben.'); return; }
      state.settings.minutesPerFolge = v;
      saveSettings();
      render();
    };
    document.getElementById('newPinInput').oninput = (e) => state.newPin1 = e.target.value.replace(/\D/g,'');
    document.getElementById('savePinBtn').onclick = () => {
      if(state.newPin1.length !== 4){ alert('Die PIN muss genau 4 Ziffern haben.'); return; }
      state.pin = state.newPin1; savePin(state.pin); state.newPin1 = ''; render();
    };
  }

  async function handleAdd(){
    state.formError = ''; state.formOk = '';
    const url = state.urlValue.trim();
    if(!url){ state.formError = 'Bitte einen YouTube-Link einfügen.'; render(); return; }
    const parsed = parseYouTube(url);
    if(!parsed){ state.formError = 'Das sieht nicht nach einem gültigen YouTube-Link aus.'; render(); return; }
    state.fetching = true; render();
    let title = state.labelValue.trim();
    if(!title){
      const fetched = await fetchTitle(url);
      title = fetched || (parsed.type === 'video' ? 'Video' : 'Playlist');
    }
    const newItem = parsed.type === 'video' ? {type:'video', videoId:parsed.id, title} : {type:'playlist', playlistId:parsed.id, title};
    state.items.push(newItem);
    saveItems();
    state.fetching = false; state.urlValue = ''; state.labelValue = '';
    state.formOk = '"'+title+'" wurde hinzugefügt.';
    render();
  }

  window.addEventListener('beforeunload', () => {
    try{
      if(state.currentKidId && state.chipStates[state.currentKidId]) saveChipStates();
    }catch(e){}
  });

  loadData();
  showFileProtocolWarning();
})();
</script>
